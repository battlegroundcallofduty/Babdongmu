services:
  app:
    build: .
    # 외부 노출은 Caddy 가 담당. 8000 은 호스트 localhost 에서 디버깅 용도로만 접근 가능.
    ports:
      - "127.0.0.1:8000:8000"
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://babdongmu:babdongmu1234@postgres:5432/babdongmu
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/openapi.json')\""]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: babdongmu
      POSTGRES_PASSWORD: babdongmu1234
      POSTGRES_DB: babdongmu
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U babdongmu"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-babdongmu.duckdns.org}
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
