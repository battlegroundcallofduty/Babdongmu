<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>호스팅 탐색 - 밥동무</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/common.css">
  <style>
    .hidden { display: none !important; }

    .match-page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .header-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #F8F5F1;
      color: #6B5E53;
      font-size: 13px;
      font-weight: 600;
    }

    .filter-bar {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .result-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      color: #6B5E53;
      font-size: 14px;
    }

    .quick-panel {
      background: #fff;
      border: 1px solid #E8E0D8;
      border-radius: 16px;
      padding: 18px 20px;
      margin-bottom: 24px;
      color: #6B5E53;
      box-shadow: 0 10px 30px rgba(44, 36, 32, 0.05);
    }

    .quick-panel h3 {
      margin: 0 0 8px;
      color: #2C2420;
    }

    .quick-panel p {
      margin: 0;
      line-height: 1.6;
    }

    .hosting-card {
      display: block;
      text-decoration: none;
      color: inherit;
      height: 100%;
      cursor: pointer;
    }

    .hosting-card:focus-visible {
      outline: 3px solid rgba(212, 118, 60, 0.35);
      outline-offset: 4px;
    }

    .hosting-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
    }

    .hosting-avatar {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #D4763C, #5B8C5A);
      flex-shrink: 0;
    }

    .hosting-header-text {
      min-width: 0;
      flex: 1;
    }

    .hosting-name {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.45;
      color: #2C2420;
      margin-bottom: 6px;
      word-break: keep-all;
    }

    .hosting-address {
      color: #8C7E73;
      font-size: 14px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: normal;
      word-break: keep-all;
    }

    .hosting-menu {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.4;
      color: #D4763C;
      margin-bottom: 16px;
      word-break: keep-all;
    }

    .hosting-status-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hosting-status-row-after-menu {
      margin-bottom: 14px;
    }

    .hosting-status-badge {
      width: fit-content;
    }

    .hosting-meta {
      display: block;
      margin-bottom: 12px;
      padding-top: 14px;
      border-top: 1px solid #F2ECE6;
    }

    .hosting-meta-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      color: #6B5E53;
      font-size: 15px;
      font-weight: 500;
      line-height: 1.5;
    }

    .hosting-meta-row + .hosting-meta-row {
      margin-top: 6px;
    }

    .hosting-meta-label {
      min-width: 36px;
      color: #8C7E73;
      font-weight: 700;
      flex-shrink: 0;
    }

    .hosting-meta-value {
      min-width: 0;
      word-break: keep-all;
    }

    .hosting-helper {
      color: #8C7E73;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .hosting-card-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .hosting-card-actions .btn {
      flex: 1;
      min-width: 0;
      pointer-events: none;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-open { background: #EDF5ED; color: #3A6B39; }
    .badge-full { background: #FDF5E6; color: #8B6914; }
    .badge-failed { background: #FDECEC; color: #B44646; }
    .badge-progress { background: #EEF3FF; color: #4269B4; }
    .badge-closed { background: #F0EBE6; color: #6B5E53; }

    .empty-state {
      padding: 56px 24px;
      text-align: center;
    }

    .empty-state-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 16px;
      color: #D4763C;
    }


    @media (max-width: 768px) {
      .filter-bar {
        grid-template-columns: 1fr;
      }

      .result-summary {
        align-items: flex-start;
        flex-direction: column;
      }

      .hosting-card-actions .btn {
        width: 100%;
      }

      .hosting-name {
        font-size: 17px;
      }

      .hosting-menu {
        font-size: 20px;
      }

    }
  </style>
</head>
<body>
<div id="nav-placeholder"></div>

  </div>

  <main class="container">
    <div class="page-header slide-up match-page-header">
      <div>
        <h1>호스팅 탐색</h1>
        <p>지역과 시간, 메뉴를 살펴보고 나와 맞는 식사 동행 호스팅을 찾아보세요.</p>
        <div class="header-badges">
          <span class="header-badge">봉사자 전용 탐색 화면</span>
          <span class="header-badge">카드 선택 시 상세 페이지 이동</span>
        </div>
      </div>
    </div>

    <section class="quick-panel slide-up stagger-1">
      <h3>어떻게 고르면 좋을까요?</h3>
      <p>가까운 지역, 부담 없는 시간대, 함께 먹고 싶은 메뉴를 기준으로 찾아보세요. 카드를 누르면 상세 화면에서 일정과 주소를 확인하고 신청할 수 있어요.</p>
    </section>

    <div class="filter-bar slide-up stagger-2">
      <select id="filter-sigungu" class="form-input">
        <option value="">전체 시군구</option>
      </select>

      <select id="filter-status" class="form-input">
        <option value="">전체 상태</option>
        <option value="OPEN">신청가능</option>
        <option value="FULL">모집완료</option>
        <option value="FIXED">확정</option>
        <option value="IN_PROGRESS">진행중</option>
        <option value="CLOSED">완료</option>
        <option value="FAILED">취소</option>
      </select>

      <select id="filter-sort" class="form-input">
        <option value="soonest">가까운 일정순</option>
        <option value="latest">최근 등록순</option>
      </select>

      <input id="filter-keyword" class="form-input" type="text" placeholder="메뉴 또는 지역 검색">
    </div>

    <div class="result-summary slide-up stagger-3">
      <span id="result-count">0건</span>
      <span>신청 전 상세 정보를 꼭 확인해주세요.</span>
    </div>

    <div id="hosting-list" class="grid grid-3"></div>

    <div id="empty-state" class="empty-state hidden">
      <svg class="empty-state-icon" viewBox="0 0 80 80" fill="none">
        <circle cx="40" cy="40" r="36" fill="currentColor" opacity="0.06"/>
        <path d="M24 44c0-8.8 7.2-16 16-16s16 7.2 16 16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M20 44h40v2c0 6.6-5.4 12-12 12H32c-6.6 0-12-5.4-12-12v-2z" fill="currentColor" opacity="0.08"/>
        <path d="M35 36c-.8-3 1-6 5-6s5.5 3 5 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
      </svg>
      <p id="empty-title">지금 볼 수 있는 호스팅이 없어요</p>
      <p id="empty-description" class="text-sm mt-sm">조금 뒤에 다시 확인하거나 필터를 바꿔보세요.</p>
    </div>
  </main>


  <div id="footer-placeholder"></div>

  <script src="/js/api.js"></script>
  <script src="/js/modal.js"></script>
  <script type="module">
    import { requireRoles } from '/js/authGuard.js';

    const KST_TIME_ZONE = 'Asia/Seoul';
    const VOLUNTEER_HOSTINGS_API = '/hostings/public';

    let hostingItems = [];

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function parseApiDateTime(value) {
      if (!value) {
        return null;
      }

      if (value instanceof Date) {
        return value;
      }

      if (typeof value === 'string') {
        const normalizedValue = value.includes('T')
          && !value.endsWith('Z')
          && !/[+-]\d{2}:\d{2}$/.test(value)
          ? `${value}Z`
          : value;

        return new Date(normalizedValue);
      }

      return new Date(value);
    }

    function getStatusMeta(status) {
      const metaMap = {
        'OPEN': { label: '신청가능', className: 'badge-open' },
        'FULL': { label: '모집완료', className: 'badge-full' },
        'FIXED': { label: '확정', className: 'badge-full' },
        'FAILED': { label: '취소됨', className: 'badge-failed' },
        'IN_PROGRESS': { label: '진행중', className: 'badge-progress' },
        'CLOSED': { label: '완료', className: 'badge-closed' },
      };

      return metaMap[status] ?? { label: status ?? '-', className: 'badge-closed' };
    }

    function formatDateTimeRange(hostingAt, hostingEnd) {
      const startDate = parseApiDateTime(hostingAt);
      const endDate = parseApiDateTime(hostingEnd);

      if (!startDate || Number.isNaN(startDate.getTime()) || !endDate || Number.isNaN(endDate.getTime())) {
        return '-';
      }

      const dateText = new Intl.DateTimeFormat('ko-KR', {
        timeZone: KST_TIME_ZONE,
        month: 'long',
        day: 'numeric',
        weekday: 'short',
      }).format(startDate);

      const startTimeText = new Intl.DateTimeFormat('ko-KR', {
        timeZone: KST_TIME_ZONE,
        hour: '2-digit',
        minute: '2-digit',
        hour12: false,
      }).format(startDate);

      const endTimeText = new Intl.DateTimeFormat('ko-KR', {
        timeZone: KST_TIME_ZONE,
        hour: '2-digit',
        minute: '2-digit',
        hour12: false,
      }).format(endDate);

      return `${dateText} · ${startTimeText} ~ ${endTimeText}`;
    }

    function formatHostingDate(hostingAt) {
      const startDate = parseApiDateTime(hostingAt);

      if (!startDate || Number.isNaN(startDate.getTime())) {
        return '-';
      }

      return new Intl.DateTimeFormat('ko-KR', {
        timeZone: KST_TIME_ZONE,
        month: 'long',
        day: 'numeric',
        weekday: 'short',
      }).format(startDate);
    }

    function formatHostingTimeRange(hostingAt, hostingEnd) {
      const startDate = parseApiDateTime(hostingAt);
      const endDate = parseApiDateTime(hostingEnd);

      if (!startDate || Number.isNaN(startDate.getTime()) || !endDate || Number.isNaN(endDate.getTime())) {
        return '-';
      }

      const startTimeText = new Intl.DateTimeFormat('ko-KR', {
        timeZone: KST_TIME_ZONE,
        hour: '2-digit',
        minute: '2-digit',
        hour12: false,
      }).format(startDate);

      const endTimeText = new Intl.DateTimeFormat('ko-KR', {
        timeZone: KST_TIME_ZONE,
        hour: '2-digit',
        minute: '2-digit',
        hour12: false,
      }).format(endDate);

      return `${startTimeText} ~ ${endTimeText}`;
    }

    function getHostingDurationHours(hostingAt, hostingEnd) {
      const startDate = parseApiDateTime(hostingAt);
      const endDate = parseApiDateTime(hostingEnd);

      if (!startDate || Number.isNaN(startDate.getTime()) || !endDate || Number.isNaN(endDate.getTime())) {
        return null;
      }

      const durationMs = endDate.getTime() - startDate.getTime();
      const durationHours = durationMs / (60 * 60 * 1000);

      if (!Number.isFinite(durationHours) || durationHours <= 0) {
        return null;
      }

      return Number.isInteger(durationHours)
        ? String(durationHours)
        : durationHours.toFixed(1);
    }

    function formatDateTimeRangeWithDuration(hostingAt, hostingEnd) {
      const dateTimeRangeText = formatDateTimeRange(hostingAt, hostingEnd);
      const durationHours = getHostingDurationHours(hostingAt, hostingEnd);

      if (dateTimeRangeText === '-' || !durationHours) {
        return dateTimeRangeText;
      }

      return `${dateTimeRangeText} (${durationHours}시간 진행)`;
    }

    function formatHostingTimeRangeWithDuration(hostingAt, hostingEnd) {
      const timeRangeText = formatHostingTimeRange(hostingAt, hostingEnd);
      const durationHours = getHostingDurationHours(hostingAt, hostingEnd);

      if (timeRangeText === '-' || !durationHours) {
        return timeRangeText;
      }

      return `${timeRangeText} (${durationHours}시간 진행)`;
    }

    function buildHostingAddressText(hosting) {
      const baseAddress = [hosting?.address.road_address, hosting?.address.detail_address]
        .filter(Boolean)
        .join(' ')
        .trim();

      if (!baseAddress) {
        return hosting?.address.building_name ?? '';
      }

      if (!hosting?.address.building_name) {
        return baseAddress;
      }

      return `${baseAddress} (${hosting.address.building_name})`;
    }

    function getCurrentPeopleCount(hosting) {
      return Number(hosting?.current_people ?? 0);
    }

    function formatHostingPeopleText(hosting) {
      const currentPeople = getCurrentPeopleCount(hosting);
      const maxPeople = Number(hosting?.max_people ?? 0);

      return `${currentPeople}/${maxPeople}명`;
    }

    function buildHostingTitle(hosting) {
      const regionParts = [hosting?.address.sigungu, hosting?.address.bname].filter(Boolean);
      return regionParts.length > 0 ? `${regionParts.join(' · ')} 호스팅` : '호스팅';
    }

    function goToHostingDetail(hostingId) {
      window.location.href = `/pages/hosting-detail.html?id=${hostingId}&view=volunteer`;
    }

    function buildHostingCard(hosting) {
      const statusMeta = getStatusMeta(hosting.hosting_status);
      const titleText = buildHostingTitle(hosting);
      const avatarText = (hosting.sigungu ?? '밥').charAt(0);
      const addressText = buildHostingAddressText(hosting);
      const helperText = formatHostingPeopleText(hosting);

      const cardElement = document.createElement('article');
      cardElement.className = 'card hosting-card slide-up';
      cardElement.dataset.sigungu = hosting.address.sigungu ?? '';
      cardElement.dataset.status = hosting.hosting_status ?? '';
      cardElement.dataset.keyword = [
        hosting.menu,
        hosting.address.sigungu,
        hosting.address.bname,
        hosting.address.road_address,
        hosting.address.detail_address,
        hosting.address.building_name,
      ]
        .filter(Boolean)
        .join(' ')
        .toLowerCase();
      cardElement.tabIndex = 0;
      cardElement.setAttribute('role', 'link');
      cardElement.setAttribute('aria-label', `${titleText} 상세 보기`);
      cardElement.addEventListener('click', () => {
        goToHostingDetail(hosting.hosting_id);
      });
      cardElement.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          goToHostingDetail(hosting.hosting_id);
        }
      });

      cardElement.innerHTML = `
        <div class="card-body">
          <div class="hosting-header">
            <div class="hosting-avatar">${escapeHtml(avatarText)}</div>
            <div class="hosting-header-text">
              <div class="hosting-name">${escapeHtml(titleText)}</div>
              <div class="hosting-address" title="${escapeHtml(addressText || '-')}">${escapeHtml(addressText || '-')}</div>
            </div>
          </div>

          <div class="hosting-menu">${escapeHtml(hosting.menu || '-')}</div>

          <div class="hosting-status-row hosting-status-row-after-menu">
            <span class="badge hosting-status-badge ${statusMeta.className}">
              ${escapeHtml(statusMeta.label)}
            </span>
          </div>

          <div class="hosting-meta">
            <div class="hosting-meta-row">
              <span class="hosting-meta-label">날짜</span>
              <span class="hosting-meta-value">${escapeHtml(formatHostingDate(hosting.hosting_at))}</span>
            </div>
            <div class="hosting-meta-row">
              <span class="hosting-meta-label">시간</span>
              <span class="hosting-meta-value">${escapeHtml(formatHostingTimeRangeWithDuration(hosting.hosting_at, hosting.hosting_end))}</span>
            </div>
          </div>

          <div class="hosting-helper">모집 인원 ${escapeHtml(helperText)}</div>

          <div class="hosting-card-actions">
            <span class="btn btn-primary">상세 보기</span>
          </div>
        </div>
      `;

      return cardElement;
    }

    function renderSigunguOptions() {
      const sigunguSelectElement = document.querySelector('#filter-sigungu');
      const previousValue = sigunguSelectElement.value;

      const sigunguSet = new Set(
        hostingItems
          .map((hosting) => hosting.address.sigungu ?? '')
          .filter(Boolean)
      );

      sigunguSelectElement.innerHTML = '<option value="">전체 시군구</option>';

      [...sigunguSet]
        .sort((left, right) => left.localeCompare(right, 'ko'))
        .forEach((sigungu) => {
          sigunguSelectElement.appendChild(new Option(sigungu, sigungu));
        });

      sigunguSelectElement.value = [...sigunguSet].includes(previousValue) ? previousValue : '';
    }

    function sortHostings(items) {
      const selectedSort = document.querySelector('#filter-sort').value;
      const clonedItems = [...items];

      if (selectedSort === 'latest') {
        clonedItems.sort((left, right) => new Date(right.created_at) - new Date(left.created_at));
        return clonedItems;
      }

      clonedItems.sort((left, right) => new Date(left.hosting_at) - new Date(right.hosting_at));
      return clonedItems;
    }

    function renderHostings() {
      const hostingListElement = document.querySelector('#hosting-list');
      const emptyStateElement = document.querySelector('#empty-state');
      const emptyTitleElement = document.querySelector('#empty-title');
      const emptyDescriptionElement = document.querySelector('#empty-description');
      const resultCountElement = document.querySelector('#result-count');

      const selectedSigungu = document.querySelector('#filter-sigungu').value;
      const selectedStatus = document.querySelector('#filter-status').value;
      const keyword = document.querySelector('#filter-keyword').value.trim().toLowerCase();

      hostingListElement.innerHTML = '';

      const filteredItems = hostingItems.filter((hosting) => {
        const matchesSigungu = !selectedSigungu || hosting.address.sigungu === selectedSigungu;
        const matchesStatus = !selectedStatus || hosting.hosting_status === selectedStatus;

        const keywordTarget = [
          hosting.menu,
          hosting.address.sigungu,
          hosting.address.bname,
          hosting.address.road_address,
          hosting.address.detail_address,
          hosting.address.building_name,
        ]
          .filter(Boolean)
          .join(' ')
          .toLowerCase();

        const matchesKeyword = !keyword || keywordTarget.includes(keyword);

        return matchesSigungu && matchesStatus && matchesKeyword;
      });

      const sortedItems = sortHostings(filteredItems);
      resultCountElement.textContent = `${sortedItems.length}건`;

      if (hostingItems.length === 0) {
        emptyStateElement.classList.remove('hidden');
        emptyTitleElement.textContent = '지금 볼 수 있는 호스팅이 없어요';
        emptyDescriptionElement.textContent = '조금 뒤에 다시 확인해주세요.';
        return;
      }

      if (sortedItems.length === 0) {
        emptyStateElement.classList.remove('hidden');
        emptyTitleElement.textContent = '조건에 맞는 호스팅이 없어요';
        emptyDescriptionElement.textContent = '지역, 상태, 검색어를 바꿔보세요.';
        return;
      }

      emptyStateElement.classList.add('hidden');

      sortedItems.forEach((hosting) => {
        hostingListElement.appendChild(buildHostingCard(hosting));
      });
    }

    async function loadHostings() {
      hostingItems = await api(VOLUNTEER_HOSTINGS_API);
      renderSigunguOptions();
      renderHostings();
    }

    async function initializePage() {
      try {
        await loadHostings();
      } catch (error) {
        console.error(error);
        await showResultModal(
          error?.message || '호스팅 목록을 불러오지 못했어요.',
          'error'
        );
      }
    }

    document.querySelector('#filter-sigungu')?.addEventListener('change', renderHostings);
    document.querySelector('#filter-status')?.addEventListener('change', renderHostings);
    document.querySelector('#filter-sort')?.addEventListener('change', renderHostings);
    document.querySelector('#filter-keyword')?.addEventListener('input', renderHostings);


    document.addEventListener('keydown', (event) => {
      if (event.key !== 'Escape') {
        return;
      }

      if (document.querySelector('#result-modal').classList.contains('open')) {
        closeResultModal();
      }
    });

    async function bootstrap() {
      const currentUser = await requireRoles(['volunteer', 'admin']);
      if (!currentUser) {
        return;
      }

      await initializePage();
    }

    bootstrap();
  </script>
  <script src="/js/base.js"></script>
  <script src="/js/footer.js"></script>
</body>
</html>
