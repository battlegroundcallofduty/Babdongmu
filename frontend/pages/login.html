<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/assets/icons/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - 밥동무</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/common.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <svg class="nav-logo-icon" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14" fill="#D4763C" opacity="0.12"/><path d="M8 18c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="#D4763C" stroke-width="2" stroke-linecap="round"/><path d="M6 18h20v1c0 3.3-2.7 6-6 6h-8c-3.3 0-6-2.7-6-6v-1z" fill="#D4763C" opacity="0.2"/><path d="M13 14c-.5-2 .5-4 3-4s3.5 2 3 4" stroke="#5B8C5A" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/></svg>
        밥동무
      </a>
      <ul class="nav-links">
        <li><a href="/pages/hostings.html">호스팅</a></li>
        <li><a href="/pages/login.html" class="active">로그인</a></li>
        <li><a href="/pages/register.html">회원가입</a></li>
      </ul>
      <button class="nav-toggle" onclick="toggleNav()" aria-label="메뉴"><span></span><span></span><span></span></button>
    </div>
  </nav>
  <div class="nav-drawer" id="navDrawer" onclick="closeNav(event)"><div class="nav-drawer-content"><a href="/pages/hostings.html">호스팅</a><a href="/pages/login.html" class="active">로그인</a><a href="/pages/register.html">회원가입</a></div></div>

  <main class="login-wrap">
    <div class="login-card slide-up">
      <div class="login-header">
        <h1>로그인</h1>
        <p>이메일과 비밀번호로 로그인하세요</p>
      </div>

      <div id="register-notice" class="alert alert-info hidden">
        가입이 완료됐습니다! 로그인 후 마이페이지에서 관리자의 승인 상태를 확인해보세요.
      </div>

      <a href="/api/v1/auth/kakao" class="kakao-login-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M9 0.6C4.03 0.6 0 3.73 0 7.55c0 2.47 1.64 4.64 4.1 5.87-.18.67-.65 2.42-.74 2.8-.12.47.17.46.36.34.15-.1 2.37-1.61 3.33-2.27.31.04.63.06.95.06 4.97 0 9-3.13 9-6.8C18 3.73 13.97.6 9 .6" fill="#181600"/>
        </svg>
        카카오 로그인
      </a>

      <div class="login-divider">
        <span>또는</span>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">이메일</label>
          <input class="form-input" type="email" id="email" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">비밀번호</label>
          <input class="form-input" type="password" id="password" placeholder="비밀번호 입력" required>
        </div>
        <div id="error-msg" class="alert alert-error hidden"></div>
        <button type="submit" class="btn btn-primary w-full mt-md">로그인</button>
      </form>

      <p class="login-footer">
        계정이 없으신가요? <a href="/pages/register.html">회원가입</a>
      </p>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script>
    function toggleNav(){const t=document.querySelector('.nav-toggle'),d=document.getElementById('navDrawer');t.classList.toggle('active');d.classList.toggle('open');document.body.style.overflow=d.classList.contains('open')?'hidden':'';}
    function closeNav(e){if(e.target===e.currentTarget)toggleNav();}
  </script>
  <script src="/js/login.js"></script>
</body>
</html>
