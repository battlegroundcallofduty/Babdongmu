<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - 밥동무</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/common.css">
</head>
<body>
<div id="nav-placeholder"></div>

  </div>

  <main class="login-wrap">
    <div class="login-card slide-up">
      <div class="login-header">
        <h1>로그인</h1>
        <p>이메일과 비밀번호로 로그인하세요</p>
      </div>

      <div id="register-notice" class="alert alert-info hidden">
        가입이 완료됐습니다! 로그인 후 마이페이지에서 관리자의 승인 상태를 확인해보세요.
      </div>

      <a href="/api/v1/users/kakao/login" class="kakao-login-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M9 0.6C4.03 0.6 0 3.73 0 7.55c0 2.47 1.64 4.64 4.1 5.87-.18.67-.65 2.42-.74 2.8-.12.47.17.46.36.34.15-.1 2.37-1.61 3.33-2.27.31.04.63.06.95.06 4.97 0 9-3.13 9-6.8C18 3.73 13.97.6 9 .6" fill="#181600"/>
        </svg>
        카카오 로그인
      </a>

      <div class="login-divider">
        <span>또는</span>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">이메일</label>
          <input class="form-input" type="email" id="email" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">비밀번호</label>
          <input class="form-input" type="password" id="password" placeholder="비밀번호 입력" required>
        </div>
        <div id="error-msg" class="alert alert-error hidden"></div>
        <button type="submit" class="btn btn-primary w-full mt-md">로그인</button>
      </form>

      <p class="login-footer">
        계정이 없으신가요? <a href="/pages/register.html">회원가입</a><br>
        비밀번호를 잊으셨나요? <a href="#" id="forgot-pw-link">비밀번호 찾기</a>
      </p>
    </div>
  </main>

  <!-- 비밀번호 찾기 모달 -->
  <div id="pw-reset-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="pw-reset-title">
    <div class="modal-panel">
      <div class="modal-header">
        <h3 id="pw-reset-title">비밀번호 찾기</h3>
        <button type="button" class="modal-close-button" id="pw-reset-close" aria-label="닫기">×</button>
      </div>
      <div class="modal-body">

        <!-- 1단계: 이메일 입력 -->
        <div id="pw-step-1">
          <p class="modal-message">가입했던 이메일을 입력하시면<br>등록된 핸드폰번호로 인증코드를 발송합니다.</p>
          <div class="form-group mt-md">
            <label class="form-label" for="pw-email">이메일</label>
            <input class="form-input" type="email" id="pw-email" placeholder="example@email.com">
          </div>
          <div id="pw-step1-error" class="alert alert-error hidden"></div>
          <button type="button" class="btn btn-primary w-full mt-md" id="pw-step1-btn">인증코드 발송</button>
        </div>

        <!-- 2단계: SMS 코드 입력 -->
        <div id="pw-step-2" class="hidden">
          <p class="modal-message" id="pw-phone-hint"></p>
          <div class="form-group mt-md">
            <label class="form-label" for="pw-code">인증코드 6자리</label>
            <input class="form-input" type="text" id="pw-code" maxlength="6" placeholder="123456" inputmode="numeric">
          </div>
          <div id="pw-step2-error" class="alert alert-error hidden"></div>
          <button type="button" class="btn btn-primary w-full mt-md" id="pw-step2-btn">확인</button>
          <p class="login-footer mt-sm"><a href="#" id="pw-resend-link">인증코드 재발송</a></p>
        </div>

        <!-- 3단계: 새 비밀번호 설정 -->
        <div id="pw-step-3" class="hidden">
          <div class="form-group">
            <label class="form-label" for="pw-new">새 비밀번호</label>
            <input class="form-input" type="password" id="pw-new" placeholder="8자 이상">
          </div>
          <div class="form-group mt-sm">
            <label class="form-label" for="pw-confirm">비밀번호 확인</label>
            <input class="form-input" type="password" id="pw-confirm" placeholder="비밀번호 재입력">
          </div>
          <div id="pw-step3-error" class="alert alert-error hidden"></div>
          <button type="button" class="btn btn-primary w-full mt-md" id="pw-step3-btn">변경하기</button>
        </div>

      </div>
    </div>
  </div>

  <script src="/js/base.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/modal.js"></script>
  <script>
  </script>
  <script src="/js/login.js"></script>
</body>
</html>
