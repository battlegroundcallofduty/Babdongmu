<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>호스팅 상세 - 밥동무</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/common.css">
  <style>
    .hidden {
      display: none !important;
    }

    .page-shell {
      max-width: 720px;
    }

    .profile-card,
    .detail-section,
    .empty-panel {
      background: #fff;
      border: 1px solid #E8E0D8;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(44, 36, 32, 0.05);
    }

    .profile-card {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 24px;
    }

    .profile-avatar {
      width: 64px;
      height: 64px;
      border-radius: 999px;
      background: linear-gradient(135deg, #D4763C, #5B8C5A);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .profile-details {
      min-width: 0;
      flex: 1;
    }

    .profile-details h2 {
      margin: 0 0 8px;
      font-size: 28px;
      word-break: keep-all;
    }

    .profile-meta,
    .profile-summary,
    .detail-value,
    .empty-panel p,
    .section-caption {
      color: #6B5E53;
      line-height: 1.6;
    }

    .profile-summary {
      margin-top: 12px;
    }

    .detail-section {
      margin-bottom: 24px;
    }

    .detail-section h3 {
      margin-top: 0;
      margin-bottom: 8px;
    }

    .section-caption {
      margin-bottom: 18px;
      font-size: 14px;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 1px solid #F2ECE6;
    }

    .detail-row:last-child {
      border-bottom: 0;
    }

    .detail-label {
      color: #8C7E73;
      font-weight: 600;
    }

    .detail-value {
      min-width: 0;
      word-break: break-word;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge-open {
      background: #EDF5ED;
      color: #3A6B39;
    }

    .badge-full {
      background: #FDF5E6;
      color: #8B6914;
    }

    .badge-failed {
      background: #FDECEC;
      color: #B44646;
    }

    .badge-progress {
      background: #EEF3FF;
      color: #4269B4;
    }

    .badge-closed {
      background: #F0EBE6;
      color: #6B5E53;
    }

    .action-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .action-row .btn {
      flex: 1;
      min-width: 0;
    }

    .back-link {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      color: inherit;
      text-decoration: none;
      margin-bottom: 24px;
    }

    .back-link svg {
      width: 20px;
      height: 20px;
    }

    .empty-panel {
      text-align: center;
    }

    .review-card {
      padding: 16px 0;
      border-bottom: 1px solid #F2ECE6;
    }

    .review-card:last-child {
      border-bottom: 0;
    }

    .review-card-date {
      font-size: 13px;
      color: #8C7E73;
      margin-bottom: 8px;
    }

    .review-card-contents {
      color: #2C2420;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .review-images {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .review-images img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
    }

    .empty-panel h2 {
      margin-top: 0;
      margin-bottom: 10px;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 60;
      box-sizing: border-box;
      overflow: hidden;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal-panel {
      width: min(100%, 420px);
      max-height: calc(100vh - 48px);
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 48px rgba(44, 36, 32, 0.18);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-sizing: border-box;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 20px 24px 14px;
      border-bottom: 1px solid #F2ECE6;
      flex-shrink: 0;
    }

    .modal-header h3 {
      margin: 0;
      font-size: 20px;
      line-height: 1.4;
      color: #2C2420;
    }

    .modal-close-button {
      border: 0;
      background: transparent;
      font-size: 24px;
      cursor: pointer;
      color: #8C7E73;
      line-height: 1;
      padding: 0;
    }

    .modal-body {
      padding: 18px 24px 24px;
      overflow-y: auto;
      scrollbar-gutter: stable;
    }

    .modal-message {
      font-size: 15px;
      line-height: 1.6;
      color: #6B5E53;
      white-space: pre-wrap;
      word-break: keep-all;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .result-modal.success .modal-header h3 {
      color: #2E5D2E;
    }

    .result-modal.error .modal-header h3 {
      color: #9A3838;
    }

    .result-modal.info .modal-header h3 {
      color: #6B5E53;
    }

    body.modal-open {
      overflow: hidden;
    }

    @media (max-width: 768px) {
      .detail-row {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .action-row .btn {
        width: 100%;
      }

      .profile-card {
        align-items: flex-start;
      }

      .profile-details h2 {
        font-size: 24px;
      }

      .modal-overlay {
        padding: 16px;
      }

      .modal-panel {
        max-height: calc(100vh - 32px);
      }

      .modal-header {
        padding: 18px 20px 12px;
      }

      .modal-body {
        padding: 16px 20px 20px;
      }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <svg class="nav-logo-icon" viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="14" fill="#D4763C" opacity="0.12"/>
          <path d="M8 18c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="#D4763C" stroke-width="2" stroke-linecap="round"/>
          <path d="M6 18h20v1c0 3.3-2.7 6-6 6h-8c-3.3 0-6-2.7-6-6v-1z" fill="#D4763C" opacity="0.2"/>
          <ellipse cx="16" cy="18" rx="10" ry="2" fill="#D4763C" opacity="0.15"/>
          <path d="M13 14c-.5-2 .5-4 3-4s3.5 2 3 4" stroke="#5B8C5A" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
        </svg>
        밥동무
      </a>

      <ul id="desktop-nav-links" class="nav-links">
        <li><a id="desktop-nav-primary" href="/pages/hostings.html">호스팅 관리</a></li>
        <li><a id="desktop-nav-secondary" href="/pages/my-matches.html">내 매칭</a></li>
        <li><a href="/pages/mypage.html">마이페이지</a></li>
      </ul>

      <button class="nav-toggle" type="button" onclick="toggleNav()" aria-label="메뉴 열기">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="nav-drawer" id="navDrawer" onclick="closeNav(event)">
    <div class="nav-drawer-content">
      <a id="drawer-nav-primary" href="/pages/hostings.html">호스팅 관리</a>
      <a id="drawer-nav-secondary" href="/pages/my-matches.html">내 매칭</a>
      <a href="/pages/mypage.html">마이페이지</a>
    </div>
  </div>

  <main class="container page-shell">
    <a id="back-link" href="/pages/hostings.html" class="back-link slide-up">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 4l-6 6 6 6"/>
      </svg>
      <span id="back-link-text">목록으로</span>
    </a>

    <div id="detail-content" class="hidden">
      <section class="profile-card slide-up">
        <div id="senior-avatar" class="profile-avatar">밥</div>
        <div class="profile-details">
          <h2 id="senior-name">호스팅</h2>
          <p id="senior-meta" class="profile-meta">-</p>
          <p id="senior-summary" class="profile-summary hidden"></p>
        </div>
      </section>

      <div class="action-row slide-up stagger-1">
        <button id="cancel-hosting-button" class="btn btn-secondary hidden" type="button">호스팅 취소</button>
        <button id="apply-hosting-button" class="btn btn-primary hidden" type="button">이 호스팅 신청하기</button>
      </div>

      <section class="detail-section slide-up stagger-2">
        <h3>호스팅 정보</h3>
        <div class="detail-row">
          <span class="detail-label">상태</span>
          <span id="hosting-status" class="detail-value">-</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">메뉴</span>
          <span id="hosting-menu" class="detail-value">-</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">일시</span>
          <span id="hosting-datetime" class="detail-value">-</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">모집 인원</span>
          <span id="hosting-max-people" class="detail-value">-</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">어르신 특이사항</span>
          <span id="hosting-special-note" class="detail-value">-</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">주소</span>
          <span id="hosting-address" class="detail-value">-</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">생성일</span>
          <span id="hosting-created-at" class="detail-value">-</span>
        </div>
      </section>

      <section id="review-section" class="detail-section slide-up stagger-3 hidden">
        <h3>어르신 후기</h3>
        <p id="review-empty" class="section-caption hidden">아직 후기가 없어요.</p>
        <div id="review-list"></div>
      </section>
    </div>

    <section id="empty-panel" class="empty-panel hidden slide-up">
      <h2>호스팅을 찾을 수 없어요</h2>
      <p>삭제되었거나 접근 권한이 없는 호스팅일 수 있어요.</p>
    </section>
  </main>

  <div
    id="result-modal"
    class="modal-overlay"
    role="dialog"
    aria-modal="true"
    aria-labelledby="result-modal-title"
  >
    <div id="result-modal-panel" class="modal-panel result-modal info">
      <div class="modal-header">
        <h3 id="result-modal-title">안내</h3>
        <button
          id="close-result-modal-button"
          type="button"
          class="modal-close-button"
          aria-label="닫기"
        >
          ×
        </button>
      </div>

      <div class="modal-body">
        <div id="result-modal-message" class="modal-message"></div>

        <div class="modal-actions">
          <button id="result-modal-confirm-button" type="button" class="btn btn-primary btn-sm">
            확인
          </button>
        </div>
      </div>
    </div>
  </div>

  <div
    id="confirm-modal"
    class="modal-overlay"
    role="dialog"
    aria-modal="true"
    aria-labelledby="confirm-modal-title"
  >
    <div class="modal-panel">
      <div class="modal-header">
        <h3 id="confirm-modal-title">안내</h3>
        <button
          id="close-confirm-modal-button"
          type="button"
          class="modal-close-button"
          aria-label="닫기"
        >
          ×
        </button>
      </div>

      <div class="modal-body">
        <div id="confirm-modal-message" class="modal-message"></div>

        <div class="modal-actions">
          <button id="confirm-modal-cancel-button" type="button" class="btn btn-ghost btn-sm">
            취소
          </button>
          <button id="confirm-modal-confirm-button" type="button" class="btn btn-primary btn-sm">
            확인
          </button>
        </div>
      </div>
    </div>
  </div> 

  <div id="footer-placeholder"></div>

  <script src="/js/api.js"></script>
  <script type="module">
    import {
      requireAuth,
      redirectByRole,
      validateHostingDetailAccess,
      getCurrentUser,
    } from '/js/authGuard.js';

    const KST_TIME_ZONE = 'Asia/Seoul';
    const VIEW_MODE_GUARDIAN = 'guardian';
    const VIEW_MODE_VOLUNTEER = 'volunteer';

    let hostingDetail = null;
    let seniorDetail = null;
    let viewMode = VIEW_MODE_GUARDIAN;
    let currentUser = null;
    let myMatchId = null;

    let resultModalResolver = null;
    let confirmModalHandler = null;

    function toggleNav() {
      const toggleElement = document.querySelector('.nav-toggle');
      const drawerElement = document.querySelector('#navDrawer');
      toggleElement.classList.toggle('active');
      drawerElement.classList.toggle('open');
      document.body.style.overflow = drawerElement.classList.contains('open') ? 'hidden' : '';
    }

    function closeNav(event) {
      if (event.target === event.currentTarget) {
        toggleNav();
      }
    }

    window.toggleNav = toggleNav;
    window.closeNav = closeNav;

    function isAnyModalOpen() {
      return document.querySelector('#result-modal').classList.contains('open')
        || document.querySelector('#confirm-modal').classList.contains('open');
    }

    function syncBodyScrollLock() {
      if (isAnyModalOpen()) {
        document.body.classList.add('modal-open');
      } else {
        document.body.classList.remove('modal-open');
      }
    }

    function getResultModalTitle(type) {
      if (type === 'success') {
        return '완료';
      }
      if (type === 'error') {
        return '오류';
      }
      return '안내';
    }

    function showResultModal(message, type = 'info') {
      return new Promise((resolve) => {
        const resultModalElement = document.querySelector('#result-modal');
        const resultModalPanelElement = document.querySelector('#result-modal-panel');
        const resultModalTitleElement = document.querySelector('#result-modal-title');
        const resultModalMessageElement = document.querySelector('#result-modal-message');

        resultModalPanelElement.className = `modal-panel result-modal ${type}`;
        resultModalTitleElement.textContent = getResultModalTitle(type);
        resultModalMessageElement.textContent = message;

        resultModalElement.classList.add('open');
        resultModalResolver = resolve;
        syncBodyScrollLock();
      });
    }

    function closeResultModal() {
      const resultModalElement = document.querySelector('#result-modal');
      resultModalElement.classList.remove('open');

      if (resultModalResolver) {
        const resolve = resultModalResolver;
        resultModalResolver = null;
        resolve();
      }

      syncBodyScrollLock();
    }

    function openConfirmModal({
      title,
      message,
      confirmText = '확인',
      cancelText = '취소',
      onConfirm = null,
    }) {
      const confirmModalElement = document.querySelector('#confirm-modal');
      const confirmModalTitleElement = document.querySelector('#confirm-modal-title');
      const confirmModalMessageElement = document.querySelector('#confirm-modal-message');
      const confirmModalConfirmButtonElement = document.querySelector('#confirm-modal-confirm-button');
      const confirmModalCancelButtonElement = document.querySelector('#confirm-modal-cancel-button');

      confirmModalTitleElement.textContent = title;
      confirmModalMessageElement.textContent = message;
      confirmModalConfirmButtonElement.textContent = confirmText;
      confirmModalCancelButtonElement.textContent = cancelText;
      confirmModalHandler = onConfirm;

      confirmModalElement.classList.add('open');
      syncBodyScrollLock();
    }

    function closeConfirmModal() {
      const confirmModalElement = document.querySelector('#confirm-modal');
      confirmModalElement.classList.remove('open');
      confirmModalHandler = null;
      syncBodyScrollLock();
    }

    async function handleConfirmModalAction() {
      if (!confirmModalHandler) {
        closeConfirmModal();
        return;
      }

      const handler = confirmModalHandler;
      closeConfirmModal();
      await handler();
    }

    function getStatusMeta(status) {
      const metaMap = {
        OPEN: { label: '신청가능', className: 'badge-open' },
        FULL: { label: '모집완료', className: 'badge-full' },
        FIXED: { label: '확정', className: 'badge-full' },
        FAILED: { label: '취소', className: 'badge-failed' },
        IN_PROGRESS: { label: '진행중', className: 'badge-progress' },
        CLOSED: { label: '완료', className: 'badge-closed' },
      };

      return metaMap[status] ?? { label: status ?? '-', className: 'badge-closed' };
    }

    function formatDate(value, options = {}) {
      if (!value) {
        return '-';
      }

      return new Intl.DateTimeFormat('ko-KR', {
        timeZone: KST_TIME_ZONE,
        ...options,
      }).format(new Date(value));
    }

    function formatDateTimeRange(hostingAt, hostingEnd) {
      const dateText = formatDate(hostingAt, {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        weekday: 'short',
      });
      const startTimeText = formatDate(hostingAt, {
        hour: '2-digit',
        minute: '2-digit',
        hour12: false,
      });
      const endTimeText = formatDate(hostingEnd, {
        hour: '2-digit',
        minute: '2-digit',
        hour12: false,
      });

      return `${dateText} ${startTimeText} ~ ${endTimeText}`;
    }

    function setText(selector, value) {
      document.querySelector(selector).textContent = value || '-';
    }

    function getViewMode() {
      const params = new URLSearchParams(window.location.search);
      const requestedViewMode = params.get('view');

      if (requestedViewMode === VIEW_MODE_VOLUNTEER) {
        return VIEW_MODE_VOLUNTEER;
      }

      return VIEW_MODE_GUARDIAN;
    }

    function getHostingId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    }

    function getBackLinkHref() {
      return viewMode === VIEW_MODE_VOLUNTEER
        ? '/pages/hosting-match.html'
        : '/pages/hostings.html';
    }

    function getBackLinkText() {
      return viewMode === VIEW_MODE_VOLUNTEER
        ? '호스팅 탐색으로'
        : '호스팅 관리로';
    }

    function getDetailApiPath(hostingId) {
      return viewMode === VIEW_MODE_VOLUNTEER
        ? `/hostings/public/${hostingId}`
        : `/hostings/${hostingId}`;
    }

    function isVolunteerView() {
      return viewMode === VIEW_MODE_VOLUNTEER;
    }

    function isGuardianView() {
      return viewMode === VIEW_MODE_GUARDIAN;
    }

    function isApplyEnabled(status) {
      return status === 'OPEN';
    }

    function getCurrentRecruitCount() {
      const directCount = [
        hostingDetail?.current_people,
        hostingDetail?.current_person_count,
        hostingDetail?.current_match_count,
        hostingDetail?.approved_match_count,
        hostingDetail?.recruited_people_count,
      ].find((value) => typeof value === 'number');

      if (typeof directCount === 'number') {
        return directCount;
      }

      if (hostingDetail?.hosting_status === 'FULL'
        || hostingDetail?.hosting_status === 'FIXED'
        || hostingDetail?.hosting_status === 'IN_PROGRESS'
        || hostingDetail?.hosting_status === 'CLOSED') {
        return hostingDetail?.max_people ?? 0;
      }

      return 0;
    }

    function buildHostingAddress() {
      const addressParts = [
        hostingDetail?.address.road_address,
        hostingDetail?.address.detail_address,
      ].filter(Boolean);

      const buildingParts = [];

      if (hostingDetail?.address.is_apartment) {
        buildingParts.push('아파트');
      }

      if (hostingDetail?.address.building_name) {
        buildingParts.push(hostingDetail.address.building_name);
      }

      const buildingText = buildingParts.join(' / ');

      if (buildingText) {
        addressParts.push(buildingText);
      }

      return addressParts.join(' ').trim() || '-';
    }

    function configurePageByViewMode() {
      const backLinkElement = document.querySelector('#back-link');
      const backLinkTextElement = document.querySelector('#back-link-text');
      const desktopPrimaryElement = document.querySelector('#desktop-nav-primary');
      const drawerPrimaryElement = document.querySelector('#drawer-nav-primary');
      const desktopSecondaryElement = document.querySelector('#desktop-nav-secondary');
      const drawerSecondaryElement = document.querySelector('#drawer-nav-secondary');

      backLinkElement.href = getBackLinkHref();
      backLinkTextElement.textContent = getBackLinkText();

      if (isVolunteerView()) {
        desktopPrimaryElement.textContent = '호스팅 탐색';
        desktopPrimaryElement.href = '/pages/hosting-match.html';
        desktopPrimaryElement.classList.add('active');

        drawerPrimaryElement.textContent = '호스팅 탐색';
        drawerPrimaryElement.href = '/pages/hosting-match.html';
        drawerPrimaryElement.classList.add('active');

        desktopSecondaryElement.textContent = '내 매칭';
        desktopSecondaryElement.href = '/pages/my-matches.html';

        drawerSecondaryElement.textContent = '내 매칭';
        drawerSecondaryElement.href = '/pages/my-matches.html';
      } else {
        desktopPrimaryElement.textContent = '호스팅 관리';
        desktopPrimaryElement.href = '/pages/hostings.html';
        desktopPrimaryElement.classList.add('active');

        drawerPrimaryElement.textContent = '호스팅 관리';
        drawerPrimaryElement.href = '/pages/hostings.html';
        drawerPrimaryElement.classList.add('active');

        desktopSecondaryElement.textContent = '내 매칭';
        desktopSecondaryElement.href = '/pages/my-matches.html';

        drawerSecondaryElement.textContent = '내 매칭';
        drawerSecondaryElement.href = '/pages/my-matches.html';
      }
    }

    function renderProfileHeader() {
      const seniorAvatarElement = document.querySelector('#senior-avatar');
      const seniorNameElement = document.querySelector('#senior-name');
      const seniorMetaElement = document.querySelector('#senior-meta');
      const summaryElement = document.querySelector('#senior-summary');

      const hostingAddress = [hostingDetail?.address.road_address, hostingDetail?.address.detail_address]
        .filter(Boolean)
        .join(' ');

      if (isGuardianView()) {
        const fullSeniorName = seniorDetail?.name
          ? `${seniorDetail.name} 어르신`
          : `어르신 #${hostingDetail.senior_id}`;
        const seniorAvatarText = seniorDetail?.name ? seniorDetail.name.charAt(0) : '어';
        const seniorMetaParts = [];

        if (typeof seniorDetail?.age === 'number') {
          seniorMetaParts.push(`${seniorDetail.age}세`);
        }

        if (hostingAddress) {
          seniorMetaParts.push(hostingAddress);
        }

        seniorAvatarElement.textContent = seniorAvatarText;
        seniorNameElement.textContent = fullSeniorName;
        seniorMetaElement.textContent = seniorMetaParts.join(' · ') || '-';

        if (seniorDetail?.ai_summary) {
          summaryElement.textContent = seniorDetail.ai_summary;
          summaryElement.classList.remove('hidden');
        } else {
          summaryElement.textContent = '';
          summaryElement.classList.add('hidden');
        }

        return;
      }

      seniorAvatarElement.textContent = (hostingDetail?.address.sigungu ?? '호').charAt(0);
      seniorNameElement.textContent = hostingDetail?.address.sigungu
        ? `${hostingDetail.address.sigungu} 호스팅`
        : '호스팅 상세';
      seniorMetaElement.textContent = [
        hostingAddress,
        hostingDetail?.address.bname,
      ].filter(Boolean).join(' · ') || '-';

      summaryElement.textContent = '일정과 주소를 확인한 뒤 신청해 주세요.';
      summaryElement.classList.remove('hidden');
    }

    function renderActionButtons() {
      const cancelButtonElement = document.querySelector('#cancel-hosting-button');
      const applyButtonElement = document.querySelector('#apply-hosting-button');

      cancelButtonElement.classList.add('hidden');
      applyButtonElement.classList.add('hidden');

      if (isGuardianView()) {
        const canCancel = ['OPEN', 'FULL', 'FAILED'].includes(hostingDetail.hosting_status);

        cancelButtonElement.classList.remove('hidden');
        cancelButtonElement.disabled = !canCancel;

        if (hostingDetail.hosting_status === 'FAILED') {
          cancelButtonElement.textContent = '취소됨';
        } else {
          cancelButtonElement.textContent = '호스팅 취소';
        }

        return;
      }

      applyButtonElement.classList.remove('hidden');

      if (myMatchId !== null) {
        applyButtonElement.className = 'btn btn-secondary';
        applyButtonElement.disabled = false;
        applyButtonElement.textContent = '신청 취소';
      } else {
        applyButtonElement.className = 'btn btn-primary';
        applyButtonElement.disabled = !isApplyEnabled(hostingDetail.hosting_status);
        applyButtonElement.textContent = isApplyEnabled(hostingDetail.hosting_status)
          ? '이 호스팅 신청하기'
          : '현재 신청할 수 없어요';
      }
    }

    function renderDetail() {
      const statusMeta = getStatusMeta(hostingDetail.hosting_status);
      const currentRecruitCount = getCurrentRecruitCount();

      document.querySelector('#detail-content').classList.remove('hidden');
      document.querySelector('#empty-panel').classList.add('hidden');

      renderProfileHeader();

      document.querySelector('#hosting-status').innerHTML = `<span class="badge ${statusMeta.className}">${statusMeta.label}</span>`;
      setText('#hosting-menu', hostingDetail.menu);
      setText('#hosting-datetime', formatDateTimeRange(hostingDetail.hosting_at, hostingDetail.hosting_end));
      setText('#hosting-max-people', `${currentRecruitCount}명 / ${hostingDetail.max_people}명`);
      setText('#hosting-special-note', seniorDetail?.special_note || '-');
      setText('#hosting-address', buildHostingAddress());
      setText('#hosting-created-at', formatDate(hostingDetail.created_at, {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false,
      }));

      renderActionButtons();
    }

    function renderReviews(reviews) {
      const sectionElement = document.querySelector('#review-section');
      const emptyElement = document.querySelector('#review-empty');
      const listElement = document.querySelector('#review-list');

      sectionElement.classList.remove('hidden');

      if (!reviews || reviews.length === 0) {
        emptyElement.classList.remove('hidden');
        return;
      }

      listElement.innerHTML = reviews.map((review) => {
        const dateText = formatDate(review.created_at, {
          year: 'numeric',
          month: 'long',
          day: 'numeric',
        });

        const imagesHtml = review.images && review.images.length > 0
          ? `<div class="review-images">${review.images.map((img) => `<img src="${img.image_url}" alt="후기 이미지" loading="lazy">`).join('')}</div>`
          : '';

        return `
          <div class="review-card">
            <p class="review-card-date">${dateText}</p>
            <p class="review-card-contents">${review.contents}</p>
            ${imagesHtml}
          </div>
        `;
      }).join('');
    }

    async function loadReviews(seniorId) {
      try {
        const reviews = await api(`/reviews/senior/${seniorId}`);
        renderReviews(reviews);
      } catch {
        renderReviews([]);
      }
    }

    async function loadDetail() {
      const hostingId = getHostingId();

      if (!hostingId) {
        document.querySelector('#detail-content').classList.add('hidden');
        document.querySelector('#empty-panel').classList.remove('hidden');
        return;
      }

      try {
        hostingDetail = await api(getDetailApiPath(hostingId));

        if (isGuardianView()) {
          seniorDetail = await api(`/seniors/${hostingDetail.senior_id}`);
        } else {
          seniorDetail = null;
          try {
            const checkResult = await api(`/matches/my/check?hosting_id=${hostingId}`);
            myMatchId = checkResult.is_applied ? checkResult.matching_id : null;
          } catch {
            myMatchId = null;
          }
        }

        renderDetail();
        loadReviews(hostingDetail.senior_id);
      } catch (error) {
        console.error(error);
        document.querySelector('#detail-content').classList.add('hidden');
        document.querySelector('#empty-panel').classList.remove('hidden');
        await showResultModal(
          error?.message || '호스팅 상세 정보를 불러오지 못했어요.',
          'error',
        );
      }
    }

    async function cancelHosting() {
      if (!hostingDetail) {
        return;
      }

      if (hostingDetail.hosting_status === 'FAILED') {
        await showResultModal('이미 취소된 호스팅이에요.', 'info');
        return;
      }

      openConfirmModal({
        title: '호스팅 취소',
        message: '이 호스팅을 취소할까요?\n취소 후에는 다시 되돌릴 수 없어요.',
        confirmText: '취소하기',
        cancelText: '닫기',
        onConfirm: async () => {
          try {
            await api(`/hostings/${hostingDetail.hosting_id}/cancel`, {
              method: 'PATCH',
            });

            await loadDetail();
            await showResultModal('호스팅이 취소되었어요.', 'success');
          } catch (error) {
            console.error(error);
            await showResultModal(
              error?.message || '호스팅 취소에 실패했어요.',
              'error',
            );
          }
        },
      });
    }

    async function applyToHosting() {
      if (!hostingDetail || !isApplyEnabled(hostingDetail.hosting_status)) {
        await showResultModal('현재 신청할 수 없는 호스팅이에요.', 'info');
        return;
      }

      openConfirmModal({
        title: '호스팅 신청',
        message: '이 호스팅에 신청할까요?',
        confirmText: '신청하기',
        cancelText: '취소',
        onConfirm: async () => {
          try {
            await api('/matches/', {
              method: 'POST',
              body: JSON.stringify({
                hosting_id: hostingDetail.hosting_id,
              }),
            });

            await loadDetail();
            await showResultModal('호스팅 신청이 완료되었어요.', 'success');
          } catch (error) {
            console.error(error);
            await showResultModal(
              error?.message || '호스팅 신청에 실패했어요.',
              'error',
            );
          }
        },
      });
    }

    async function cancelMyMatch() {
      openConfirmModal({
        title: '신청 취소',
        message: '이 호스팅 신청을 취소할까요?',
        confirmText: '취소하기',
        cancelText: '닫기',
        onConfirm: async () => {
          try {
            await api(`/matches/${myMatchId}/cancel`, { method: 'PATCH' });
            await loadDetail();
            await showResultModal('신청이 취소되었어요.', 'success');
          } catch (error) {
            console.error(error);
            await showResultModal(error?.message || '신청 취소에 실패했어요.', 'error');
          }
        },
      });
    }

    document.querySelector('#cancel-hosting-button')?.addEventListener('click', async () => {
      await cancelHosting();
    });

    document.querySelector('#apply-hosting-button')?.addEventListener('click', async () => {
      if (myMatchId !== null) {
        await cancelMyMatch();
      } else {
        await applyToHosting();
      }
    });

    document.querySelector('#result-modal-confirm-button')?.addEventListener('click', () => {
      closeResultModal();
    });

    document.querySelector('#close-result-modal-button')?.addEventListener('click', () => {
      closeResultModal();
    });

    document.querySelector('#result-modal')?.addEventListener('click', (event) => {
      if (event.target === event.currentTarget) {
        closeResultModal();
      }
    });

    document.querySelector('#close-confirm-modal-button')?.addEventListener('click', () => {
      closeConfirmModal();
    });

    document.querySelector('#confirm-modal-cancel-button')?.addEventListener('click', () => {
      closeConfirmModal();
    });

    document.querySelector('#confirm-modal-confirm-button')?.addEventListener('click', async () => {
      await handleConfirmModalAction();
    });

    document.querySelector('#confirm-modal')?.addEventListener('click', (event) => {
      if (event.target === event.currentTarget) {
        closeConfirmModal();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key !== 'Escape') {
        return;
      }

      if (document.querySelector('#result-modal').classList.contains('open')) {
        closeResultModal();
        return;
      }

      if (document.querySelector('#confirm-modal').classList.contains('open')) {
        closeConfirmModal();
      }
    });

    async function bootstrap() {
      currentUser = await requireAuth();
      if (!currentUser) {
        return;
      }

      viewMode = getViewMode();

      const hasAccess = await validateHostingDetailAccess(viewMode);
      if (!hasAccess) {
        const refreshedUser = await getCurrentUser();
        if (refreshedUser) {
          redirectByRole(refreshedUser.user_role);
        } else {
          redirectByRole(currentUser.user_role);
        }
        return;
      }

      configurePageByViewMode();
      await loadDetail();
    }

    bootstrap();
  </script>
  <script src="/js/base.js"></script>
  <script src="/js/footer.js"></script>
</body>
</html>
