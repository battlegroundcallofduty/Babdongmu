<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>어르신 관리 - 밥동무</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/common.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <svg class="nav-logo-icon" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14" fill="#D4763C" opacity="0.12"/><path d="M8 18c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="#D4763C" stroke-width="2" stroke-linecap="round"/><path d="M6 18h20v1c0 3.3-2.7 6-6 6h-8c-3.3 0-6-2.7-6-6v-1z" fill="#D4763C" opacity="0.2"/><path d="M13 14c-.5-2 .5-4 3-4s3.5 2 3 4" stroke="#5B8C5A" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/></svg>
        밥동무
      </a>
      <ul class="nav-links">
        <li><a href="/pages/guardian.html" class="active">어르신 관리</a></li>
        <li><a href="/pages/mypage.html">마이페이지</a></li>
      </ul>
      <button class="nav-toggle" onclick="toggleNav()" aria-label="메뉴"><span></span><span></span><span></span></button>
    </div>
  </nav>
  <div class="nav-drawer" id="navDrawer" onclick="closeNav(event)"><div class="nav-drawer-content"><a href="/pages/guardian.html" class="active">어르신 관리</a><a href="/pages/mypage.html">마이페이지</a></div></div>

  <main class="container">
    <div class="page-header slide-up">
      <h1>어르신 관리</h1>
      <p>어르신을 등록하고 호스팅 현황을 확인하세요</p>
    </div>

    <!-- 어르신 목록 -->
    <div class="section-header slide-up stagger-1">
      <h2>내 어르신</h2>
      <button id="show-register-form" class="btn btn-primary btn-sm">어르신 등록</button>
    </div>

    <div id="senior-list" class="grid grid-2 mb-lg slide-up stagger-2">
      <div class="card">
        <div class="card-body">
          <div class="hosting-header mb-md">
            <div class="hosting-avatar">김</div>
            <div>
              <div class="hosting-name">김순자 어르신</div>
              <div class="hosting-district">78세 · 성북구 정릉동</div>
            </div>
          </div>
          <div class="detail-row">
            <span class="detail-label">가능 요일</span>
            <span class="detail-value">월, 수, 금</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">시간대</span>
            <span class="detail-value">점심</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">상태</span>
            <span class="detail-value"><span class="badge badge-open">활성</span></span>
          </div>
        </div>
      </div>
    </div>

    <!-- 어르신 등록 폼 -->
    <div id="register-form-section" class="card mb-lg hidden">
      <div class="card-body">
        <h3 class="mb-lg">어르신 등록</h3>
        <form id="senior-form">
          <div class="grid grid-2">
            <div class="form-group">
              <label class="form-label" for="senior-name">이름</label>
              <input class="form-input" type="text" id="senior-name" placeholder="홍길순" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="senior-age">나이</label>
              <input class="form-input" type="number" id="senior-age" placeholder="78" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="senior-address">주소</label>
            <input class="form-input" type="text" id="senior-address" placeholder="서울시 성북구 정릉동 123-45" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="senior-district">동네</label>
            <input class="form-input" type="text" id="senior-district" placeholder="성북구 정릉동" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="senior-days">가능 요일</label>
            <input class="form-input" type="text" id="senior-days" placeholder="월, 수, 금" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="senior-note">특이사항</label>
            <input class="form-input" type="text" id="senior-note" placeholder="청력이 약하심, 계단 없는 1층 등">
          </div>
          <button type="submit" class="btn btn-primary">등록하기</button>
        </form>
      </div>
    </div>

    <!-- 호스팅 현황 -->
    <div class="section-header slide-up stagger-3">
      <h2>호스팅 현황</h2>
      <a href="/pages/hostings.html" class="btn btn-ghost btn-sm">호스팅 페이지에서 등록하기</a>
    </div>

    <div class="card slide-up stagger-4">
      <div class="list-item">
        <div>
          <div class="font-bold">된장찌개 · 4월 15일 점심</div>
          <div class="text-sm text-muted">김순자 어르신 · 봉사자 2/3명</div>
        </div>
        <span class="badge badge-open">모집중</span>
      </div>
      <div class="list-item">
        <div>
          <div class="font-bold">김치찌개 · 4월 10일 점심</div>
          <div class="text-sm text-muted">김순자 어르신 · 봉사자 3/3명</div>
        </div>
        <span class="badge badge-done">완료</span>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner"><div class="footer-bottom">&copy; 2026 밥동무. 독거 어르신을 위한 식사 동반 플랫폼</div></div>
  </footer>

  <script src="/js/api.js"></script>
  <script>
    function toggleNav(){const t=document.querySelector('.nav-toggle'),d=document.getElementById('navDrawer');t.classList.toggle('active');d.classList.toggle('open');document.body.style.overflow=d.classList.contains('open')?'hidden':'';}
    function closeNav(e){if(e.target===e.currentTarget)toggleNav();}

    document.querySelector('#show-register-form')?.addEventListener('click', () => {
      document.querySelector('#register-form-section').classList.toggle('hidden');
    });
  </script>
</body>
</html>
