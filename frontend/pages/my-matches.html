<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 매칭 - 밥동무</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/common.css">
  <style>
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    .shake { animation: shake 0.4s ease; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <svg class="nav-logo-icon" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14" fill="#D4763C" opacity="0.12"/><path d="M8 18c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="#D4763C" stroke-width="2" stroke-linecap="round"/><path d="M6 18h20v1c0 3.3-2.7 6-6 6h-8c-3.3 0-6-2.7-6-6v-1z" fill="#D4763C" opacity="0.2"/><path d="M13 14c-.5-2 .5-4 3-4s3.5 2 3 4" stroke="#5B8C5A" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/></svg>
        밥동무
      </a>
      <ul class="nav-links">
        <li><a href="/pages/hostings.html">호스팅</a></li>
        <li><a href="/pages/my-matches.html" class="active">내 매칭</a></li>
        <li><a href="/pages/mypage.html">마이페이지</a></li>
      </ul>
      <button class="nav-toggle" onclick="toggleNav()" aria-label="메뉴"><span></span><span></span><span></span></button>
    </div>
  </nav>
  <div class="nav-drawer" id="navDrawer" onclick="closeNav(event)"><div class="nav-drawer-content"><a href="/pages/hostings.html">호스팅</a><a href="/pages/my-matches.html" class="active">내 매칭</a><a href="/pages/mypage.html">마이페이지</a></div></div>

  <main class="container">
    <div class="page-header slide-up">
      <h1>내 매칭</h1>
      <p>예정된 매칭과 활동 이력을 확인하세요</p>
    </div>

    <div class="tabs slide-up stagger-1">
      <button class="tab active" data-tab="scheduled">예정</button>
      <button class="tab" data-tab="completed">완료</button>
    </div>

    <div id="match-list"></div>

    <div id="empty-state" class="empty-state hidden">
      <svg class="empty-state-icon" viewBox="0 0 80 80" fill="none"><circle cx="40" cy="40" r="36" fill="currentColor" opacity="0.06"/><path d="M24 44c0-8.8 7.2-16 16-16s16 7.2 16 16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><path d="M20 44h40v2c0 6.6-5.4 12-12 12H32c-6.6 0-12-5.4-12-12v-2z" fill="currentColor" opacity="0.08"/></svg>
      <p>아직 매칭 이력이 없어요</p>
      <p class="text-sm mt-sm"><a href="/pages/hostings.html" style="color:var(--primary);font-weight:600;">호스팅을 둘러보고</a> 첫 밥동무를 시작해보세요!</p>
    </div>
  </main>

  <!-- 후기 작성 모달 -->
  <div class="modal-overlay" id="review-modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="review-modal-title">후기 작성</h3>
        <button class="modal-close" id="review-modal-close" type="button">✕</button>
      </div>
      <form id="review-form">
        <input type="hidden" id="review-match-id">
        <div class="form-group">
          <label class="form-label" for="review-content">후기 내용</label>
          <textarea class="form-input" id="review-content" rows="4"
            placeholder="봉사 경험을 자유롭게 작성해주세요" required
            maxlength="500"
            style="resize:vertical; min-height:100px;"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">
            사진 첨부
            <span style="color:var(--muted); font-weight:400; font-size:13px;">(최대 5장)</span>
          </label>
          <div id="review-img-preview" style="display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:8px;"></div>
          <label class="btn btn-ghost btn-sm" style="display:inline-flex; align-items:center; gap:4px; cursor:pointer;">
            + 사진 추가
            <input type="file" id="review-images" accept=".jpg,.jpeg,.png" multiple style="display:none;">
          </label>
          <p class="doc-hint">jpg, png / 최대 5MB씩</p>
        </div>
        <div id="review-error" class="alert alert-error hidden"></div>
        <button type="submit" class="btn btn-primary w-full">등록하기</button>
      </form>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-inner"><div class="footer-bottom">&copy; 2026 밥동무. 독거 어르신을 위한 식사 동반 플랫폼</div></div>
  </footer>

  <script src="/js/api.js"></script>
  <script>
    function toggleNav(){const t=document.querySelector('.nav-toggle'),d=document.getElementById('navDrawer');t.classList.toggle('active');d.classList.toggle('open');document.body.style.overflow=d.classList.contains('open')?'hidden':'';}
    function closeNav(e){if(e.target===e.currentTarget)toggleNav();}

    let currentTab = 'scheduled';

    // 날짜 포맷: "4월 15일 (화) · 점심"
    function formatDate(datetimeStr) {
      const d = new Date(datetimeStr);
      const days = ['일', '월', '화', '수', '목', '금', '토'];
      const hour = d.getHours();
      const mealTime = hour < 15 ? '점심' : '저녁';
      return `${d.getMonth() + 1}월 ${d.getDate()}일 (${days[d.getDay()]}) · ${mealTime}`;
    }

    // 봉사시간 포맷
    function formatVolunteerTime(match) {
      if (match.actual_volunteer_time !== null && match.actual_volunteer_time !== undefined) {
        return `${(match.actual_volunteer_time / 60).toFixed(1)}시간`;
      }
      if (match.check_in_time && match.check_out_time) {
        const diff = new Date(match.check_out_time) - new Date(match.check_in_time);
        const hours = (diff / 1000 / 60 / 60).toFixed(1);
        return `예상 ${hours}시간`;
      }
      return null;
    }

    // 매칭 카드 HTML 생성
    function createMatchCard(match, isCompleted) {
      const dateStr = formatDate(match.hosting_at);
      const hasCheckIn = !!match.check_in_time;

      if (isCompleted) {
        const timeStr = formatVolunteerTime(match);
        const meta = timeStr ? `${dateStr} · ${timeStr}` : dateStr;

        // 완료 탭: 미방문이면 배지, 후기 있으면 후기 페이지로, 없으면 후기 작성 버튼
        let action;
        if (match.match_status === 'not_visited') {
          action = `<span style="display:inline-block; padding:4px 12px; border-radius:20px; background:var(--error); color:#fff; font-size:13px; font-weight:600;">미방문</span>`;
        } else if (match.has_review) {
          action = `<a href="/pages/review-detail.html?review_id=${match.review_id}" class="btn btn-ghost btn-sm">후기 완료</a>`;
        } else {
          action = `<button class="btn btn-ghost btn-sm review-btn"
               data-match-id="${match.matching_id}"
               data-title="${match.senior_name} 어르신 · ${match.menu}">후기 작성</button>`;
        }

        return `
          <div class="card match-card mb-md">
            <div class="card-body">
              <div class="match-info">
                <h3>${match.senior_name} 어르신 · ${match.menu}</h3>
                <p class="match-meta">${meta}</p>
              </div>
              <div class="match-actions">${action}</div>
            </div>
          </div>`;
      } else {
        const address = match.senior_address || '';
        const meta = address ? `${dateStr} · ${address}` : dateStr;

        // QR 체크인/아웃 방식이므로 버튼 없이 예정 배지만 표시
        return `
          <div class="card match-card mb-md">
            <div class="card-body">
              <div class="match-info">
                <h3>${match.senior_name} 어르신 · ${match.menu}</h3>
                <p class="match-meta">${meta}</p>
              </div>
              <div class="match-actions"></div>
            </div>
          </div>`;
      }
    }

    // 매칭 목록 로드
    async function loadMatches(isCompleted) {
      const list = document.getElementById('match-list');
      const empty = document.getElementById('empty-state');
      list.innerHTML = '';
      empty.classList.add('hidden');

      try {
        const matches = await api(`/matches/my?is_completed=${isCompleted}&page=1`);

        if (!matches || matches.length === 0) {
          empty.classList.remove('hidden');
          return;
        }

        list.innerHTML = matches.map(m => createMatchCard(m, isCompleted)).join('');
        bindCardEvents();
      } catch (err) {
        list.innerHTML = `<p style="color:var(--error)">${err.message}</p>`;
      }
    }

    // 카드 버튼 이벤트 바인딩
    function bindCardEvents() {
      // 후기 작성
      document.querySelectorAll('.review-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          openReviewModal(btn.dataset.matchId, btn.dataset.title);
        });
      });
    }

    // 탭 전환
    document.querySelectorAll('.tab[data-tab]').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab[data-tab]').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentTab = tab.dataset.tab;
        loadMatches(currentTab === 'completed');
      });
    });

    // 후기 모달
    function openReviewModal(matchId, title) {
      document.getElementById('review-match-id').value = matchId;
      document.getElementById('review-modal-title').textContent = title + ' 후기';
      document.getElementById('review-form').reset();
      document.getElementById('review-img-preview').innerHTML = '';
      document.getElementById('review-error').classList.add('hidden');
      document.getElementById('review-modal-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeReviewModal() {
      document.getElementById('review-modal-overlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    // 500자 초과 입력 시 shake 효과
    document.getElementById('review-content')?.addEventListener('keydown', (e) => {
      const textarea = e.target;
      const editKeys = ['Backspace', 'Delete', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'];
      if (textarea.value.length >= 500 && !editKeys.includes(e.key) && !e.ctrlKey && !e.metaKey) {
        e.preventDefault();
        textarea.classList.remove('shake');
        void textarea.offsetWidth; // reflow로 애니메이션 재실행
        textarea.classList.add('shake');
        textarea.addEventListener('animationend', () => textarea.classList.remove('shake'), { once: true });
      }
    });

    document.getElementById('review-images')?.addEventListener('change', (e) => {
      const files = [...e.target.files];
      if (files.length > 5) {
        alert('사진은 최대 5장까지 첨부할 수 있어요.');
        e.target.value = '';
        return;
      }
      const preview = document.getElementById('review-img-preview');
      preview.innerHTML = '';
      files.forEach(file => {
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        img.style.cssText = 'width:100%; aspect-ratio:1; object-fit:cover; border-radius:8px;';
        preview.appendChild(img);
      });
    });

    document.getElementById('review-form')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('review-error');
      errorEl.classList.add('hidden');

      const matchId = document.getElementById('review-match-id').value;
      const contents = document.getElementById('review-content').value;
      const files = document.querySelector('#review-images')?.files || [];

      const formData = new FormData();
      formData.append('match_id', matchId);
      formData.append('contents', contents);
      for (const file of files) formData.append('images', file);

      try {
        const token = localStorage.getItem('access_token');
        const res = await fetch('/api/v1/reviews', {
          method: 'POST',
          headers: token ? { 'Authorization': `Bearer ${token}` } : {},
          body: formData,
        });

        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.detail || '등록 실패');
        }

        closeReviewModal();
        await loadMatches(true);
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
      }
    });

    document.getElementById('review-modal-close')?.addEventListener('click', closeReviewModal);
    document.getElementById('review-modal-overlay')?.addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeReviewModal();
    });

    // 로그인 여부 확인
    if (!localStorage.getItem('access_token')) {
      window.location.href = '/pages/login.html';
    }

    // 초기 로드
    loadMatches(false);
  </script>
</body>
</html>
