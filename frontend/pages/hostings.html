<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>호스팅 관리 - 밥동무</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/common.css">
  <style>
    .hidden { display: none !important; }

    .hosting-page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .page-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .filter-bar {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .hosting-card {
      display: block;
      text-decoration: none;
      color: inherit;
      height: 100%;
      cursor: pointer;
    }

    .hosting-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
    }

    .hosting-avatar {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #D4763C, #5B8C5A);
      flex-shrink: 0;
    }

    .hosting-header-text {
      min-width: 0;
      flex: 1;
    }

    .hosting-name {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.45;
      color: #2C2420;
      margin-bottom: 6px;
      word-break: keep-all;
    }

    .hosting-address {
      color: #8C7E73;
      font-size: 14px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: normal;
      word-break: keep-all;
    }

    .hosting-status-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hosting-status-row-after-menu {
      margin-bottom: 14px;
    }

    .hosting-status-badge {
      width: fit-content;
    }

    .hosting-menu {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.4;
      color: #D4763C;
      margin-bottom: 16px;
      word-break: keep-all;
    }

    .hosting-meta {
      display: block;
      margin-bottom: 12px;
      padding-top: 14px;
      border-top: 1px solid #F2ECE6;
    }

    .hosting-meta-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      color: #6B5E53;
      font-size: 15px;
      font-weight: 500;
      line-height: 1.5;
    }

    .hosting-meta-row + .hosting-meta-row {
      margin-top: 6px;
    }

    .hosting-meta-label {
      min-width: 36px;
      color: #8C7E73;
      font-weight: 700;
      flex-shrink: 0;
    }

    .hosting-meta-value {
      min-width: 0;
      word-break: keep-all;
    }

    .hosting-helper {
      color: #8C7E73;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .hosting-card-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .hosting-card-actions .btn {
      flex: 1;
      min-width: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-open { background: #EDF5ED; color: #3A6B39; }
    .badge-full { background: #FDF5E6; color: #8B6914; }
    .badge-failed { background: #FDECEC; color: #B44646; }
    .badge-progress { background: #EEF3FF; color: #4269B4; }
    .badge-closed { background: #F0EBE6; color: #6B5E53; }

    .message-box {
      display: none;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 16px;
      border: 1px solid #E8E0D8;
      background: #fff;
    }

    .message-box.show { display: block; }
    .message-box.success { background: #F6FBF6; color: #2E5D2E; border-color: #D8EAD8; }
    .message-box.error { background: #FFF6F6; color: #9A3838; border-color: #F1D0D0; }
    .message-box.info { background: #F8F5F1; color: #6B5E53; }

    .empty-state {
      padding: 56px 24px;
      text-align: center;
    }

    .empty-state-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 16px;
      color: #D4763C;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 88px 24px 32px;
      z-index: 30;
      overflow: hidden;
      box-sizing: border-box;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      width: min(100%, 640px);
      max-height: calc(100vh - 120px);
      background: #fff;
      border-radius: 16px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 24px 24px 16px;
      border-bottom: 1px solid #F2ECE6;
      flex-shrink: 0;
    }

    .modal-body {
      padding: 20px 24px 24px;
      overflow-y: auto;
      scrollbar-gutter: stable;
    }

    .modal-close {
      border: 0;
      background: transparent;
      font-size: 22px;
      cursor: pointer;
      color: #8C7E73;
    }

    .modal-notice {
      padding: 16px;
      border-radius: 12px;
      background: #F8F5F1;
      color: #6B5E53;
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .time-range {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
      align-items: center;
    }

    .form-hint {
      margin-top: 6px;
      color: #8C7E73;
      font-size: 13px;
      line-height: 1.5;
    }

    #hosting-time-summary-display {
      display: flex;
      align-items: center;
      min-height: 52px;
      color: #2C2420;
      background: #F8F5F1;
    }

    #hosting-time-summary-preview.placeholder {
      color: #8C7E73;
    }


    @media (max-width: 768px) {
      .filter-bar {
        grid-template-columns: 1fr;
      }

      .time-range {
        grid-template-columns: 1fr;
      }

      .hosting-page-header {
        align-items: stretch;
      }

      .page-actions {
        width: 100%;
      }

      .page-actions .btn,
      .hosting-card-actions .btn {
        width: 100%;
      }

      .hosting-name {
        font-size: 17px;
      }

      .hosting-menu {
        font-size: 20px;
      }

      .modal-overlay {
        padding: 72px 16px 24px;
      }

      .modal {
        max-height: calc(100vh - 96px);
      }

      .modal-header {
        padding: 20px 20px 14px;
      }

      .modal-body {
        padding: 16px 20px 20px;
      }

    }
  </style>
</head>
<body>
<div id="nav-placeholder"></div>

  </div>

  <main class="container">
    <div class="page-header slide-up hosting-page-header">
      <div>
        <h1>호스팅 관리</h1>
        <p>보호자가 등록한 호스팅을 조회하고, 어르신별로 새 호스팅을 관리할 수 있어요.</p>
      </div>

      <div class="page-actions">
        <a href="/pages/guardian.html" class="btn btn-secondary">어르신 관리</a>
        <button id="open-hosting-modal" class="btn btn-primary" type="button">+ 새 호스팅 등록</button>
      </div>
    </div>


    <div class="filter-bar slide-up stagger-1">
      <select id="filter-senior" class="form-input">
        <option value="">전체 어르신</option>
      </select>

      <select id="filter-sigungu" class="form-input">
        <option value="">전체 시군구</option>
      </select>

      <select id="filter-status" class="form-input">
        <option value="">전체 상태</option>
        <option value="OPEN">신청가능</option>
        <option value="FULL">모집완료</option>
        <option value="FIXED">확정</option>
        <option value="IN_PROGRESS">진행중</option>
        <option value="CLOSED">완료</option>
        <option value="FAILED">취소</option>
      </select>

      <input id="filter-keyword" class="form-input" type="text" placeholder="메뉴 또는 주소 검색">
    </div>

    <div id="hosting-list" class="grid grid-3"></div>

    <div id="empty-state" class="empty-state hidden">
      <svg class="empty-state-icon" viewBox="0 0 80 80" fill="none">
        <circle cx="40" cy="40" r="36" fill="currentColor" opacity="0.06"/>
        <path d="M24 44c0-8.8 7.2-16 16-16s16 7.2 16 16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M20 44h40v2c0 6.6-5.4 12-12 12H32c-6.6 0-12-5.4-12-12v-2z" fill="currentColor" opacity="0.08"/>
        <path d="M35 36c-.8-3 1-6 5-6s5.5 3 5 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
      </svg>
      <p id="empty-title">등록된 호스팅이 없어요</p>
      <p id="empty-description" class="text-sm mt-sm">어르신을 선택해 첫 호스팅을 등록해보세요.</p>
    </div>
  </main>

  <div class="modal-overlay" id="hosting-modal" role="dialog" aria-modal="true" aria-labelledby="hosting-modal-title">
    <div class="modal">
      <div class="modal-header">
        <h3 id="hosting-modal-title">새 호스팅 등록</h3>
        <button class="modal-close" id="hosting-modal-close" type="button" aria-label="닫기">✕</button>
      </div>

      <div class="modal-body">
        <div id="senior-empty" class="modal-notice hidden">
          <p>등록된 어르신이 없어요.</p>
          <p class="text-sm mt-sm">호스팅을 등록하려면 먼저 어르신을 등록해주세요.</p>
          <a href="/pages/guardian.html" class="btn btn-primary mt-md">어르신 등록하러 가기</a>
        </div>

        <form id="hosting-form">
          <div class="form-group">
            <label class="form-label" for="hosting-senior">어르신</label>
            <select class="form-input" id="hosting-senior" required></select>
          </div>

          <div class="form-group">
            <label class="form-label" for="hosting-menu">메뉴</label>
            <input class="form-input" type="text" id="hosting-menu" placeholder="그날의 식사 메뉴를 적어주세요." required>
          </div>

          <div class="form-group">
            <label class="form-label" for="hosting-date">날짜</label>
            <input class="form-input" type="date" id="hosting-date" required>
            <p class="form-hint">현재 기준 24시간 이후부터 한 달 이내로 등록할 수 있어요.</p>
          </div>

          <div class="form-group">
            <label class="form-label" for="hosting-start-time">시작 시간</label>
            <select class="form-input" id="hosting-start-time" required></select>
            <p class="form-hint">07:00 ~ 20:00 사이에서 선택해 주세요.</p>
          </div>

          <div class="form-group">
            <label class="form-label" for="hosting-duration">진행 시간</label>
            <select class="form-input" id="hosting-duration" required disabled>
              <option value="">시작 시간을 먼저 선택해 주세요</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">시간 안내</label>
            <div class="form-input" id="hosting-time-summary-display" aria-live="polite">
              <span id="hosting-time-summary-preview" class="placeholder">시작시간 ~ 종료시간</span>
            </div>
            <p class="form-hint">진행 시간을 선택하면 종료 시간이 자동으로 계산돼요.</p>
          </div>

          <div class="form-group">
            <label class="form-label" for="hosting-guests">모집 인원</label>
            <select class="form-input" id="hosting-guests" required>
              <option value="2">2명</option>
              <option value="3">3명</option>
              <option value="4">4명</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">호스팅 주소</label>
            <div class="modal-notice">
              <p id="hosting-address-preview">어르신을 선택하면 주소가 표시돼요.</p>
            </div>
          </div>

          <button id="hosting-submit-button" type="submit" class="btn btn-primary w-full">호스팅 등록하기</button>
        </form>
      </div>
    </div>
  </div>


  <div id="footer-placeholder"></div>

  <script src="/js/api.js"></script>
  <script src="/js/modal.js"></script>
  <script type="module">
    import { requireRoles } from '/js/authGuard.js';

    const KST_TIME_ZONE = 'Asia/Seoul';
    const MIN_HOSTING_INTERVAL_DAYS = 7;
    const MIN_HOSTING_START_HOUR = 7;
    const MAX_HOSTING_START_HOUR = 20;
    const MAX_HOSTING_END_HOUR = 22;


    let seniorsCache = [];
    let hostingItems = [];
    let selectedSeniorIdFromQuery = '';
    let shouldOpenCreateModalFromQuery = false;
    let seniorHostingRuleMap = new Map();

    function isHostingModalOpen() {
      return document.querySelector('#hosting-modal').classList.contains('open');
    }

    function hideMessage() {
      if (document.getElementById('result-modal')?.classList.contains('open')) {
        closeResultModal();
      }
    }

    function showMessage(message, type = 'info') {
      return showResultModal(message, type);
    }

    function getStatusMeta(status) {
      const metaMap = {
        'OPEN': { label: '신청가능', className: 'badge-open' },
        'FULL': { label: '모집완료', className: 'badge-full' },
        'FIXED': { label: '확정', className: 'badge-full' },
        'FAILED': { label: '취소됨', className: 'badge-failed' },
        'IN_PROGRESS': { label: '진행중', className: 'badge-progress' },
        'CLOSED': { label: '완료', className: 'badge-closed' },
      };

      return metaMap[status] ?? { label: status ?? '-', className: 'badge-closed' };
    }

    function getSeniorMap() {
      return new Map(seniorsCache.map((senior) => [String(senior.senior_id), senior]));
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function parseApiDateTime(value) {
      if (!value) {
        return null;
      }

      if (value instanceof Date) {
        return value;
      }

      if (typeof value === 'string') {
        const normalizedValue = value.includes('T')
          && !value.endsWith('Z')
          && !/[+-]\d{2}:\d{2}$/.test(value)
          ? `${value}Z`
          : value;

        return new Date(normalizedValue);
      }

      return new Date(value);
    }

    function formatDateTimeRange(hostingAt, hostingEnd) {
      const startDate = parseApiDateTime(hostingAt);
      const endDate = parseApiDateTime(hostingEnd);

      if (!startDate || Number.isNaN(startDate.getTime()) || !endDate || Number.isNaN(endDate.getTime())) {
        return '-';
      }

      const dateText = new Intl.DateTimeFormat('ko-KR', {
        timeZone: KST_TIME_ZONE,
        month: 'long',
        day: 'numeric',
        weekday: 'short',
      }).format(startDate);

      const startTimeText = new Intl.DateTimeFormat('ko-KR', {
        timeZone: KST_TIME_ZONE,
        hour: '2-digit',
        minute: '2-digit',
        hour12: false,
      }).format(startDate);

      const endTimeText = new Intl.DateTimeFormat('ko-KR', {
        timeZone: KST_TIME_ZONE,
        hour: '2-digit',
        minute: '2-digit',
        hour12: false,
      }).format(endDate);

      return `${dateText} · ${startTimeText} ~ ${endTimeText}`;
    }

    function formatHostingDate(hostingAt) {
      const startDate = parseApiDateTime(hostingAt);

      if (!startDate || Number.isNaN(startDate.getTime())) {
        return '-';
      }

      return new Intl.DateTimeFormat('ko-KR', {
        timeZone: KST_TIME_ZONE,
        month: 'long',
        day: 'numeric',
        weekday: 'short',
      }).format(startDate);
    }

    function formatHostingTimeRange(hostingAt, hostingEnd) {
      const startDate = parseApiDateTime(hostingAt);
      const endDate = parseApiDateTime(hostingEnd);

      if (!startDate || Number.isNaN(startDate.getTime()) || !endDate || Number.isNaN(endDate.getTime())) {
        return '-';
      }

      const startTimeText = new Intl.DateTimeFormat('ko-KR', {
        timeZone: KST_TIME_ZONE,
        hour: '2-digit',
        minute: '2-digit',
        hour12: false,
      }).format(startDate);

      const endTimeText = new Intl.DateTimeFormat('ko-KR', {
        timeZone: KST_TIME_ZONE,
        hour: '2-digit',
        minute: '2-digit',
        hour12: false,
      }).format(endDate);

      return `${startTimeText} ~ ${endTimeText}`;
    }

    function getHostingDurationHours(hostingAt, hostingEnd) {
      const startDate = parseApiDateTime(hostingAt);
      const endDate = parseApiDateTime(hostingEnd);

      if (!startDate || Number.isNaN(startDate.getTime()) || !endDate || Number.isNaN(endDate.getTime())) {
        return null;
      }

      const durationMs = endDate.getTime() - startDate.getTime();
      const durationHours = durationMs / (60 * 60 * 1000);

      if (!Number.isFinite(durationHours) || durationHours <= 0) {
        return null;
      }

      return Number.isInteger(durationHours)
        ? String(durationHours)
        : durationHours.toFixed(1);
    }

    function formatDateTimeRangeWithDuration(hostingAt, hostingEnd) {
      const dateTimeRangeText = formatDateTimeRange(hostingAt, hostingEnd);
      const durationHours = getHostingDurationHours(hostingAt, hostingEnd);

      if (dateTimeRangeText === '-' || !durationHours) {
        return dateTimeRangeText;
      }

      return `${dateTimeRangeText} (${durationHours}시간 진행)`;
    }

    function formatHostingTimeRangeWithDuration(hostingAt, hostingEnd) {
      const timeRangeText = formatHostingTimeRange(hostingAt, hostingEnd);
      const durationHours = getHostingDurationHours(hostingAt, hostingEnd);

      if (timeRangeText === '-' || !durationHours) {
        return timeRangeText;
      }

      return `${timeRangeText} (${durationHours}시간 진행)`;
    }

    function buildHostingAddressText(hosting) {
      const baseAddress = [hosting?.address.road_address, hosting?.address.detail_address]
        .filter(Boolean)
        .join(' ')
        .trim();

      if (!baseAddress) {
        return hosting?.address.building_name ?? '';
      }

      if (!hosting?.address.building_name) {
        return baseAddress;
      }

      return `${baseAddress} (${hosting.address.building_name})`;
    }

    function getCurrentPeopleCount(hosting) {
      return Number(hosting?.current_people ?? 0);
    }

    function formatHostingPeopleText(hosting) {
      const currentPeople = getCurrentPeopleCount(hosting);
      const maxPeople = Number(hosting?.max_people ?? 0);

      return `${currentPeople}/${maxPeople}명`;
    }

    function buildHostingCard(hosting) {
      const seniorMap = getSeniorMap();
      const senior = seniorMap.get(String(hosting.senior_id));
      const seniorName = senior?.name ? `${senior.name} 어르신` : `어르신 #${hosting.senior_id}`;
      const avatarText = senior?.name ? senior.name.charAt(0) : '어';
      const statusMeta = getStatusMeta(hosting.hosting_status);
      const addressText = buildHostingAddressText(hosting);
      const helperText = formatHostingPeopleText(hosting);

      const cardElement = document.createElement('article');
      cardElement.className = 'card hosting-card slide-up';
      cardElement.dataset.seniorId = String(hosting.senior_id);
      cardElement.dataset.sigungu = hosting.address.sigungu ?? '';
      cardElement.dataset.status = hosting.hosting_status ?? '';
      cardElement.dataset.keyword = [
        hosting.menu,
        hosting.address.road_address,
        hosting.address.detail_address,
        hosting.address.sigungu,
        hosting.address.bname,
        hosting.address.building_name,
        senior?.name,
      ]
        .filter(Boolean)
        .join(' ')
        .toLowerCase();
      cardElement.tabIndex = 0;
      cardElement.setAttribute('role', 'link');
      cardElement.setAttribute('aria-label', `${seniorName} 호스팅 상세 보기`);
      cardElement.addEventListener('click', (event) => {
        if (event.target.closest('.hosting-card-actions a, .hosting-card-actions button')) {
          return;
        }
        window.location.href = `/pages/hosting-detail.html?id=${hosting.hosting_id}&view=guardian`;
      });
      cardElement.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          window.location.href = `/pages/hosting-detail.html?id=${hosting.hosting_id}&view=guardian`;
        }
      });

      cardElement.innerHTML = `
        <div class="card-body">
          <div class="hosting-header">
            <div class="hosting-avatar">${escapeHtml(avatarText)}</div>
            <div class="hosting-header-text">
              <div class="hosting-name">${escapeHtml(seniorName)}</div>
              <div class="hosting-address" title="${escapeHtml(addressText || '-')}">${escapeHtml(addressText || '-')}</div>
            </div>
          </div>

          <div class="hosting-menu">${escapeHtml(hosting.menu || '-')}</div>

          <div class="hosting-status-row hosting-status-row-after-menu">

    function renderSigunguOptions() {

        const keywordTarget = [
          hosting.menu,
          hosting.address.road_address,
          hosting.address.detail_address,
          hosting.address.sigungu,

      });

    function getNormalizedHostingStartDate(hosting) {
      const hostingAt = parseApiDateTime(hosting?.hosting_at);

      if (!hostingAt || Number.isNaN(hostingAt.getTime())) {
        return null;
      }

      return hostingAt;
    }

    function addDays(date, days) {
      return new Date(date.getTime() + (days * 24 * 60 * 60 * 1000));
    }

    function getDateInputValueInKst(date) {
      if (!date || Number.isNaN(date.getTime())) {
        return '';
      }

      const formatter = new Intl.DateTimeFormat('en-CA', {
        timeZone: KST_TIME_ZONE,
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
      });

      return formatter.format(date);
    }

    function formatDateTimeForNotice(date) {
      if (!date || Number.isNaN(date.getTime())) {
        return '-';
      }

      return new Intl.DateTimeFormat('ko-KR', {
        timeZone: KST_TIME_ZONE,
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false,
      }).format(date);
    }

    function getBaseMinHostingDate() {
      return new Date(Date.now() + (24 * 60 * 60 * 1000));
    }

    function getBaseMaxHostingDate() {
      const maxDate = new Date();
      maxDate.setMonth(maxDate.getMonth() + 1);
      return maxDate;
    }

    function buildSeniorHostingRuleMap() {
      const ruleMap = new Map();

      hostingItems.forEach((hosting) => {
        if (hosting?.hosting_status === 'FAILED') {
          return;
        }

        const seniorId = String(hosting?.senior_id ?? '');
        const hostingAt = getNormalizedHostingStartDate(hosting);

        if (!seniorId || !hostingAt) {
          return;
        }

        const existingRules = ruleMap.get(seniorId) ?? [];
        existingRules.push({
          hostingId: hosting.hosting_id,
          hostingAt,
          blockedStartAt: addDays(hostingAt, -MIN_HOSTING_INTERVAL_DAYS),
          blockedEndAt: addDays(hostingAt, MIN_HOSTING_INTERVAL_DAYS),
        });
        ruleMap.set(seniorId, existingRules);
      });

      seniorHostingRuleMap = ruleMap;
    }

    function getSeniorHostingRules(seniorId) {
      if (!seniorId) {
        return [];
      }

      return seniorHostingRuleMap.get(String(seniorId)) ?? [];
    }

    function getSelectedSeniorRules() {
      const seniorId = document.querySelector('#hosting-senior')?.value;
      return getSeniorHostingRules(seniorId);
    }

    function findConflictingHostingRule(seniorId, candidateStartDate) {
      if (!candidateStartDate || Number.isNaN(candidateStartDate.getTime())) {
        return null;
      }

      return getSeniorHostingRules(seniorId).find((rule) => {
        return candidateStartDate > rule.blockedStartAt && candidateStartDate < rule.blockedEndAt;
      }) ?? null;
    }

    function buildKstDateTime(dateValue, timeValue) {
      if (!dateValue || !timeValue) {
        return null;
      }

      return parseApiDateTime(`${dateValue}T${timeValue}:00+09:00`);
    }

    function buildCandidateStartTimesForDate(dateValue) {
      const times = [];

      for (let hour = MIN_HOSTING_START_HOUR; hour <= MAX_HOSTING_START_HOUR; hour += 1) {
        times.push(`${String(hour).padStart(2, '0')}:00`);
      }

      return times.filter((timeValue) => isStartDateTimeSelectable(dateValue, timeValue));
    }

    function isStartDateTimeSelectable(dateValue, timeValue) {
      const seniorId = document.querySelector('#hosting-senior')?.value;
      const candidateDate = buildKstDateTime(dateValue, timeValue);

      if (!seniorId || !candidateDate || Number.isNaN(candidateDate.getTime())) {
        return false;
      }

      const baseMinDate = getBaseMinHostingDate();
      const baseMaxDate = getBaseMaxHostingDate();

      if (candidateDate < baseMinDate || candidateDate > baseMaxDate) {
        return false;
      }

      return !findConflictingHostingRule(seniorId, candidateDate);
    }

    function findClosestSelectableDateValue(preferredDateValue = '') {
      const baseMinDate = getBaseMinHostingDate();
      const baseMaxDate = getBaseMaxHostingDate();
      const baseMinDateValue = getDateInputValueInKst(baseMinDate);
      const baseMaxDateValue = getDateInputValueInKst(baseMaxDate);
      const startDateValue = preferredDateValue
        && preferredDateValue >= baseMinDateValue
        && preferredDateValue <= baseMaxDateValue
        ? preferredDateValue
        : baseMinDateValue;

      let cursor = buildKstDateTime(startDateValue, '00:00');

      if (!cursor || Number.isNaN(cursor.getTime())) {
        cursor = buildKstDateTime(baseMinDateValue, '00:00');
      }

      while (cursor && cursor <= baseMaxDate) {
        const dateValue = getDateInputValueInKst(cursor);
        const startTimes = buildCandidateStartTimesForDate(dateValue);

        if (startTimes.length > 0) {
          return dateValue;
        }

        cursor = addDays(cursor, 1);
      }

      return '';
    }

    function updateHostingAvailabilityNotice() {
      const addressPreviewElement = document.querySelector('#hosting-address-preview');
      const selectedSeniorId = document.querySelector('#hosting-senior')?.value;
      const senior = seniorsCache.find((item) => String(item.senior_id) === selectedSeniorId);

      addressPreviewElement.textContent = senior
        ? (buildSeniorAddressText(senior) || '등록된 주소 정보가 없어요.')
        : '어르신을 선택하면 주소가 표시돼요.';
    }

    function getDateRuleBlockingRules(dateValue) {
      if (!dateValue) {
        return [];
      }

      const selectedSeniorId = document.querySelector('#hosting-senior')?.value;
      if (!selectedSeniorId) {
        return [];
      }

      const candidateTimes = [];
      for (let hour = MIN_HOSTING_START_HOUR; hour <= MAX_HOSTING_START_HOUR; hour += 1) {
        candidateTimes.push(`${String(hour).padStart(2, '0')}:00`);
      }

      const blockingRules = new Map();

      candidateTimes.forEach((timeValue) => {
        const candidateDate = buildKstDateTime(dateValue, timeValue);
        const conflictingRule = findConflictingHostingRule(selectedSeniorId, candidateDate);

        if (conflictingRule) {
          blockingRules.set(String(conflictingRule.hostingId), conflictingRule);
        }
      });

      return [...blockingRules.values()].sort((left, right) => left.hostingAt - right.hostingAt);
    }

    function buildHostingIntervalRuleMessage(rules) {
      const hostingTimesText = rules
        .map((rule) => formatDateTimeForNotice(rule.hostingAt))
        .join(', ');

      return `등록된 각 호스팅 시작 시각의 전후 ${MIN_HOSTING_INTERVAL_DAYS}일은 새 호스팅 시작 시각으로 선택할 수 없어요.
기준 호스팅: ${hostingTimesText}`;
    }

    function updateDateConstraintsForSenior(preferredDateValue = '') {
      const dateInputElement = document.querySelector('#hosting-date');
      const baseMinDate = getBaseMinHostingDate();
      const baseMaxDate = getBaseMaxHostingDate();

      dateInputElement.min = getDateInputValueInKst(baseMinDate);
      dateInputElement.max = getDateInputValueInKst(baseMaxDate);

      if (!document.querySelector('#hosting-senior')?.value || dateInputElement.min > dateInputElement.max) {
        dateInputElement.value = '';
        dateInputElement.disabled = true;
        return {
          isAvailable: false,
          baseMinDate,
          baseMaxDate,
        };
      }

      const closestSelectableDateValue = findClosestSelectableDateValue(preferredDateValue || dateInputElement.value);

      if (!closestSelectableDateValue) {
        dateInputElement.value = '';
        dateInputElement.disabled = true;
        return {
          isAvailable: false,
          baseMinDate,
          baseMaxDate,
        };
      }

      dateInputElement.disabled = false;
      dateInputElement.value = closestSelectableDateValue;

      return {
        isAvailable: true,
        baseMinDate,
        baseMaxDate,
      };
    }

    function updateStartTimeOptionsForSelectedDate() {
      const startTimeElement = document.querySelector('#hosting-start-time');
      const selectedDateValue = document.querySelector('#hosting-date').value;
      const previousValue = startTimeElement.value;
      const selectableStartTimes = buildCandidateStartTimesForDate(selectedDateValue);

      startTimeElement.innerHTML = '';

      if (!selectableStartTimes.length) {
        startTimeElement.appendChild(new Option('선택 가능한 시작 시간이 없어요', ''));
        startTimeElement.value = '';
        startTimeElement.disabled = true;
        resetDurationOptions();
        return false;
      }

      startTimeElement.appendChild(new Option('시작 시간 선택', ''));
      selectableStartTimes.forEach((timeValue) => {
        startTimeElement.appendChild(new Option(timeValue, timeValue));
      });

      startTimeElement.disabled = false;
      startTimeElement.value = selectableStartTimes.includes(previousValue) ? previousValue : '';
      return true;
    }

    function updateHostingFormAvailability(preferredDateValue = '') {
      const submitButtonElement = document.querySelector('#hosting-submit-button');
      const durationElement = document.querySelector('#hosting-duration');
      const dateAvailability = updateDateConstraintsForSenior(preferredDateValue);

      if (!dateAvailability.isAvailable) {
        submitButtonElement.disabled = true;
        durationElement.disabled = true;
        resetDurationOptions();
        updateTimeSummaryPreview();
        return false;
      }

      const hasSelectableStartTime = updateStartTimeOptionsForSelectedDate();
      submitButtonElement.disabled = !hasSelectableStartTime;

      if (!hasSelectableStartTime) {
        durationElement.disabled = true;
        resetDurationOptions();
        updateTimeSummaryPreview();
        return false;
      }

      return true;
    }

    function buildStartTimeOptions(selectElement) {
      selectElement.innerHTML = '';
      selectElement.appendChild(new Option('날짜를 먼저 선택해 주세요', ''));
      selectElement.disabled = true;
    }

    function resetDurationOptions() {
      const durationSelectElement = document.querySelector('#hosting-duration');
      const timeSummaryPreviewElement = document.querySelector('#hosting-time-summary-preview');

      durationSelectElement.innerHTML = '';
      durationSelectElement.appendChild(new Option('시작 시간을 먼저 선택해 주세요', ''));
      durationSelectElement.value = '';
      durationSelectElement.disabled = true;

      timeSummaryPreviewElement.textContent = '시작시간 ~ 종료시간';
      timeSummaryPreviewElement.classList.add('placeholder');
    }

    function convertTimeToMinutes(timeText) {
      const [hourText, minuteText] = timeText.split(':');
      return Number(hourText) * 60 + Number(minuteText);
    }

    function convertMinutesToTime(minutes) {
      const hour = Math.floor(minutes / 60);
      const minute = minutes % 60;
      return `${String(hour).padStart(2, '0')}:${String(minute).padStart(2, '0')}`;
    }

    function buildDurationOptions(startTimeValue) {
      const durationSelectElement = document.querySelector('#hosting-duration');
      const timeSummaryPreviewElement = document.querySelector('#hosting-time-summary-preview');
      const selectedDateValue = document.querySelector('#hosting-date').value;
      const selectedSeniorId = document.querySelector('#hosting-senior').value;

      if (!startTimeValue) {
        resetDurationOptions();
        return;
      }

      const candidateStartDate = buildKstDateTime(selectedDateValue, startTimeValue);
      const conflictingRule = findConflictingHostingRule(selectedSeniorId, candidateStartDate);

      if (conflictingRule) {
        durationSelectElement.innerHTML = '';
        durationSelectElement.appendChild(new Option('선택 가능한 시작 시간이 아니에요', ''));
        durationSelectElement.value = '';
        durationSelectElement.disabled = true;
        timeSummaryPreviewElement.textContent = '선택 가능한 시작 시간을 다시 골라주세요.';
        timeSummaryPreviewElement.classList.add('placeholder');
        void showMessage(buildHostingIntervalRuleMessage([conflictingRule]), 'info');
        return;
      }

      if (!isStartDateTimeSelectable(selectedDateValue, startTimeValue)) {
        durationSelectElement.innerHTML = '';
        durationSelectElement.appendChild(new Option('선택 가능한 시작 시간이 아니에요', ''));
        durationSelectElement.value = '';
        durationSelectElement.disabled = true;
        timeSummaryPreviewElement.textContent = '현재 기준 24시간 이후부터 한 달 이내의 시간만 선택할 수 있어요.';
        timeSummaryPreviewElement.classList.add('placeholder');
        return;
      }

      const startMinutes = convertTimeToMinutes(startTimeValue);
      const durationOptions = [2, 3, 4].filter((durationHour) => {
        const endMinutes = startMinutes + (durationHour * 60);
        return endMinutes <= (MAX_HOSTING_END_HOUR * 60);
      });

      durationSelectElement.innerHTML = '';
      durationSelectElement.appendChild(new Option('진행 시간 선택', ''));

      durationOptions.forEach((durationHour) => {
        durationSelectElement.appendChild(
          new Option(`${durationHour}시간`, String(durationHour))
        );
      });

      durationSelectElement.disabled = false;
      durationSelectElement.value = '';

      timeSummaryPreviewElement.textContent = `${startTimeValue} ~ 종료시간`;
      timeSummaryPreviewElement.classList.add('placeholder');
    }

    function updateTimeSummaryPreview() {
      const startTimeValue = document.querySelector('#hosting-start-time').value;
      const durationValue = document.querySelector('#hosting-duration').value;
      const timeSummaryPreviewElement = document.querySelector('#hosting-time-summary-preview');

      if (!startTimeValue) {
        timeSummaryPreviewElement.textContent = '시작시간 ~ 종료시간';
        timeSummaryPreviewElement.classList.add('placeholder');
        return;
      }

      if (!durationValue) {
        timeSummaryPreviewElement.textContent = `${startTimeValue} ~ 종료시간`;
        timeSummaryPreviewElement.classList.add('placeholder');
        return;
      }

      const startMinutes = convertTimeToMinutes(startTimeValue);
      const endMinutes = startMinutes + (Number(durationValue) * 60);
      const endTimeValue = convertMinutesToTime(endMinutes);

      timeSummaryPreviewElement.textContent = `${startTimeValue} ~ ${endTimeValue} (${durationValue}시간 진행)`;
      timeSummaryPreviewElement.classList.remove('placeholder');
    }

    function getCalculatedEndTime() {
      const startTimeValue = document.querySelector('#hosting-start-time').value;
      const durationValue = document.querySelector('#hosting-duration').value;

      if (!startTimeValue) {
        throw new Error('호스팅 시작 시간을 선택해 주세요.');
      }

      if (!durationValue) {
        throw new Error('호스팅 진행 시간을 선택해 주세요.');
      }

      const startMinutes = convertTimeToMinutes(startTimeValue);
      const endMinutes = startMinutes + (Number(durationValue) * 60);

      if (endMinutes > (MAX_HOSTING_END_HOUR * 60)) {
        throw new Error('종료 시간은 22:00를 넘을 수 없습니다.');
      }

      return convertMinutesToTime(endMinutes);
    }


    function buildSeniorAddressText(senior) {
      const baseAddress = [senior?.address.road_address, senior?.address.detail_address]
        .filter(Boolean)
        .join(' ')
        .trim();

      if (!baseAddress) {
        return senior?.address.building_name ?? '';
      }

      if (!senior?.address.building_name) {
        return baseAddress;
      }

      return `${baseAddress} (${senior.address.building_name})`;
    }

    function fillAddressFieldsFromSenior(senior) {
      if (!senior) {
        document.querySelector('#hosting-address-preview').textContent = '어르신을 선택하면 주소가 표시돼요.';
        updateHostingFormAvailability();
        return;
      }

      document.querySelector('#hosting-guests').value = String(senior.max_people ?? 2);
      updateHostingAvailabilityNotice();
      updateHostingFormAvailability();
    }

    function renderSeniorOptions() {
      const seniorSelectElement = document.querySelector('#hosting-senior');
      const seniorEmptyElement = document.querySelector('#senior-empty');
      const hostingFormElement = document.querySelector('#hosting-form');

      if (seniorsCache.length === 0) {
        seniorEmptyElement.classList.remove('hidden');
        hostingFormElement.classList.add('hidden');
        return;
      }

      seniorEmptyElement.classList.add('hidden');
      hostingFormElement.classList.remove('hidden');
      seniorSelectElement.innerHTML = '';

      if (seniorsCache.length > 1) {
        seniorSelectElement.appendChild(new Option('어르신을 선택해주세요', ''));
      }

      seniorsCache.forEach((senior) => {
        const optionLabel = `${senior.name} 어르신 (${senior.age}세)`;
        seniorSelectElement.appendChild(new Option(optionLabel, senior.senior_id));
      });

      const seniorIdForDefault = selectedSeniorIdFromQuery && seniorsCache.some(
        (senior) => String(senior.senior_id) === selectedSeniorIdFromQuery
      )
        ? selectedSeniorIdFromQuery
        : (seniorsCache.length === 1 ? String(seniorsCache[0].senior_id) : '');

      if (seniorIdForDefault) {
        seniorSelectElement.value = seniorIdForDefault;
        const senior = seniorsCache.find(
          (item) => String(item.senior_id) === seniorIdForDefault
        );
        fillAddressFieldsFromSenior(senior);
      } else {
        fillAddressFieldsFromSenior(null);
      }
    }

    function resetHostingForm() {
      document.querySelector('#hosting-form').reset();
      document.querySelector('#hosting-start-time').value = '';
      resetDurationOptions();

      const seniorSelectElement = document.querySelector('#hosting-senior');

      if (selectedSeniorIdFromQuery && seniorsCache.some(
        (senior) => String(senior.senior_id) === selectedSeniorIdFromQuery
      )) {
        seniorSelectElement.value = selectedSeniorIdFromQuery;
        fillAddressFieldsFromSenior(
          seniorsCache.find((senior) => String(senior.senior_id) === selectedSeniorIdFromQuery)
        );
        return;
      }

      if (seniorsCache.length === 1) {
        seniorSelectElement.value = String(seniorsCache[0].senior_id);
        fillAddressFieldsFromSenior(seniorsCache[0]);
      } else {
        fillAddressFieldsFromSenior(null);
      }
    }

    function buildHostingPayload() {
      const seniorIdValue = document.querySelector('#hosting-senior').value;
      const dateValue = document.querySelector('#hosting-date').value;
      const startTimeValue = document.querySelector('#hosting-start-time').value;
      const endTimeValue = getCalculatedEndTime();

      if (!seniorIdValue) {
        throw new Error('어르신을 먼저 선택해 주세요.');
      }

      if (!dateValue) {
        throw new Error('호스팅 날짜를 선택해 주세요.');
      }

      if (!startTimeValue) {
        throw new Error('호스팅 시작 시간을 선택해 주세요.');
      }

      const nextHostingStart = buildKstDateTime(dateValue, startTimeValue);
      const conflictingRule = findConflictingHostingRule(seniorIdValue, nextHostingStart);

      if (conflictingRule) {
        throw new Error(`이 어르신은 기존 호스팅 시작 시각(${formatDateTimeForNotice(conflictingRule.hostingAt)})의 전후 ${MIN_HOSTING_INTERVAL_DAYS}일을 피해서 새 호스팅을 등록해야 해요.`);
      }

      if (!isStartDateTimeSelectable(dateValue, startTimeValue)) {
        throw new Error('선택할 수 없는 날짜 또는 시작 시간이에요. 다시 선택해 주세요.');
      }

      return {
        senior_id: Number(seniorIdValue),
        menu: document.querySelector('#hosting-menu').value.trim(),
        hosting_at: `${dateValue}T${startTimeValue}:00+09:00`,
        hosting_end: `${dateValue}T${endTimeValue}:00+09:00`,
        max_people: Number(document.querySelector('#hosting-guests').value),
      };
    }

    function openHostingModal() {
      document.querySelector('#hosting-modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeHostingModal() {
      document.querySelector('#hosting-modal').classList.remove('open');
      document.body.style.overflow = '';
    }

    function clearCreateQueryParams() {
      const nextUrl = new URL(window.location.href);
      nextUrl.searchParams.delete('open_create');
      nextUrl.searchParams.delete('senior_id');
      window.history.replaceState({}, '', `${nextUrl.pathname}${nextUrl.search}${nextUrl.hash}`);
      selectedSeniorIdFromQuery = '';
      shouldOpenCreateModalFromQuery = false;
    }

    function applyQueryParams() {
      const params = new URLSearchParams(window.location.search);
      selectedSeniorIdFromQuery = params.get('senior_id') ?? '';
      shouldOpenCreateModalFromQuery = params.get('open_create') === 'true';
    }

    async function loadSeniors() {
      const seniors = await api('/seniors/?active_only=true');
      seniorsCache = seniors;
      renderSeniorOptions();
      renderSeniorFilterOptions();
    }

    async function loadHostings() {
      hostingItems = await api('/hostings/');
      buildSeniorHostingRuleMap();
      renderSigunguOptions();
      renderHostings();
    }

    async function initializePage() {
      try {
        hideMessage();
        applyQueryParams();
        buildStartTimeOptions(document.querySelector('#hosting-start-time'));
        resetDurationOptions();

        await Promise.all([loadSeniors(), loadHostings()]);

        if (shouldOpenCreateModalFromQuery && seniorsCache.length > 0) {
          resetHostingForm();
          openHostingModal();
        }
      } catch (error) {
        console.error(error);
        await showMessage(error?.message || '호스팅 정보를 불러오지 못했어요.', 'error');
      }
    }

    document.querySelector('#filter-senior')?.addEventListener('change', renderHostings);
    document.querySelector('#filter-sigungu')?.addEventListener('change', renderHostings);
    document.querySelector('#filter-status')?.addEventListener('change', renderHostings);
    document.querySelector('#filter-keyword')?.addEventListener('input', renderHostings);

    document.querySelector('#open-hosting-modal')?.addEventListener('click', () => {
      selectedSeniorIdFromQuery = '';
      shouldOpenCreateModalFromQuery = false;
      resetHostingForm();
      openHostingModal();
    });

    document.querySelector('#hosting-modal-close')?.addEventListener('click', () => {
      closeHostingModal();
      if (shouldOpenCreateModalFromQuery) {
        clearCreateQueryParams();
      }
    });

    // 새 호스팅 등록 모달은 바깥 영역을 클릭해도 닫히지 않게 둡니다.
    // 사용자가 입력 중인 내용을 실수로 잃지 않도록 닫기 버튼 또는 ESC로만 닫습니다.

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        if (document.getElementById('result-modal')?.classList.contains('open')) {
          closeResultModal();
          return;
        }

        if (document.querySelector('#hosting-modal').classList.contains('open')) {
          closeHostingModal();
          if (shouldOpenCreateModalFromQuery) {
            clearCreateQueryParams();
          }
        }
      }
    });

    document.querySelector('#hosting-senior')?.addEventListener('change', (event) => {
      const selectedSenior = seniorsCache.find(
        (senior) => String(senior.senior_id) === event.target.value
      );

      document.querySelector('#hosting-start-time').value = '';
      resetDurationOptions();
      fillAddressFieldsFromSenior(selectedSenior);
    });

    document.querySelector('#hosting-date')?.addEventListener('change', (event) => {
      const requestedDateValue = event.target.value;
      const previousStartTime = document.querySelector('#hosting-start-time').value;
      const blockingRules = getDateRuleBlockingRules(requestedDateValue);
      const hasSelectableStartTime = buildCandidateStartTimesForDate(requestedDateValue).length > 0;

      updateHostingFormAvailability(requestedDateValue);

      if (blockingRules.length > 0 && !hasSelectableStartTime) {
        void showMessage(buildHostingIntervalRuleMessage(blockingRules), 'info');
      }

      if (previousStartTime && document.querySelector('#hosting-start-time').value === previousStartTime) {
        buildDurationOptions(previousStartTime);
      } else {
        resetDurationOptions();
      }

      updateTimeSummaryPreview();
    });

    document.querySelector('#hosting-start-time')?.addEventListener('change', (event) => {
      buildDurationOptions(event.target.value);
      updateTimeSummaryPreview();
    });

    document.querySelector('#hosting-duration')?.addEventListener('change', () => {
      updateTimeSummaryPreview();
    });

    document.querySelector('#hosting-form')?.addEventListener('submit', async (event) => {
      event.preventDefault();

      const submitButtonElement = document.querySelector('#hosting-submit-button');

      try {
        hideMessage();
        submitButtonElement.disabled = true;

        const payload = buildHostingPayload();

        await api('/hostings/', {
          method: 'POST',
          body: JSON.stringify(payload),
        });

        closeHostingModal();
        if (shouldOpenCreateModalFromQuery) {
          clearCreateQueryParams();
        }
        resetHostingForm();
        await loadHostings();
        await showMessage('호스팅이 등록되었어요.', 'success');
      } catch (error) {
        console.error(error);
        await showMessage(error?.message || '호스팅 등록에 실패했어요.', 'error');
      } finally {
        updateHostingFormAvailability(document.querySelector('#hosting-date').value);
      }
    });

    async function bootstrap() {
      const currentUser = await requireRoles(['guardian']);
      if (!currentUser) {
        return;
      }

      await initializePage();
    }

    bootstrap();
  </script>
  <script src="/js/base.js"></script>
  <script src="/js/footer.js"></script>
</body>
</html>
