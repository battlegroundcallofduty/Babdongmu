<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>호스팅 목록 - 밥동무</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/common.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <svg class="nav-logo-icon" viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="14" fill="#D4763C" opacity="0.12"/>
          <path d="M8 18c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="#D4763C" stroke-width="2" stroke-linecap="round"/>
          <path d="M6 18h20v1c0 3.3-2.7 6-6 6h-8c-3.3 0-6-2.7-6-6v-1z" fill="#D4763C" opacity="0.2"/>
          <ellipse cx="16" cy="18" rx="10" ry="2" fill="#D4763C" opacity="0.15"/>
          <path d="M13 14c-.5-2 .5-4 3-4s3.5 2 3 4" stroke="#5B8C5A" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
        </svg>
        밥동무
      </a>
      <ul class="nav-links">
        <li><a href="/pages/hostings.html" class="active">호스팅</a></li>
        <li><a href="/pages/my-matches.html">내 매칭</a></li>
        <li><a href="/pages/mypage.html">마이페이지</a></li>
      </ul>
      <button class="nav-toggle" onclick="toggleNav()" aria-label="메뉴 열기">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Mobile Drawer -->
  <div class="nav-drawer" id="navDrawer" onclick="closeNav(event)">
    <div class="nav-drawer-content">
      <a href="/pages/hostings.html" class="active">호스팅</a>
      <a href="/pages/my-matches.html">내 매칭</a>
      <a href="/pages/mypage.html">마이페이지</a>
    </div>
  </div>

  <main class="container">
    <div class="page-header slide-up">
      <h1>호스팅 목록</h1>
      <p>내 근처 어르신의 호스팅을 찾아보세요</p>
    </div>

    <!-- Filters -->
    <div class="filter-bar slide-up stagger-1">
      <select id="filter-district">
        <option value="">전체 동네</option>
        <option value="정릉동">정릉동</option>
        <option value="길음동">길음동</option>
        <option value="돈암동">돈암동</option>
      </select>
      <select id="filter-status">
        <option value="">전체 상태</option>
        <option value="approved">모집중</option>
        <option value="matched">매칭완료</option>
      </select>
    </div>

    <!-- Hosting Cards -->
    <div id="hosting-list" class="grid grid-3">
      <a href="/pages/hosting-detail.html?id=1" class="card hosting-card slide-up stagger-1">
        <div class="card-body">
          <div class="hosting-header">
            <div class="hosting-avatar">김</div>
            <div>
              <div class="hosting-name">김순자 어르신</div>
              <div class="hosting-district">
                <svg class="icon-sm" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="display:inline;vertical-align:-3px;margin-right:2px;width:14px;height:14px;">
                  <path d="M10 11a3 3 0 100-6 3 3 0 000 6z"/><path d="M10 18s-6-4.35-6-9a6 6 0 1112 0c0 4.65-6 9-6 9z"/>
                </svg>
                성북구 정릉동
              </div>
            </div>
          </div>
          <div class="hosting-menu">된장찌개</div>
          <div class="hosting-meta">
            <span>
              <svg class="icon-sm" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="display:inline;vertical-align:-3px;margin-right:2px;width:14px;height:14px;">
                <rect x="3" y="4" width="14" height="14" rx="2"/><path d="M3 8h14"/><path d="M7 2v4M13 2v4"/>
              </svg>
              4월 15일 (화) · 점심
            </span>
            <span class="badge badge-open">모집중 2/3</span>
          </div>
        </div>
      </a>

      <a href="/pages/hosting-detail.html?id=2" class="card hosting-card slide-up stagger-2">
        <div class="card-body">
          <div class="hosting-header">
            <div class="hosting-avatar">박</div>
            <div>
              <div class="hosting-name">박영희 어르신</div>
              <div class="hosting-district">
                <svg class="icon-sm" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="display:inline;vertical-align:-3px;margin-right:2px;width:14px;height:14px;">
                  <path d="M10 11a3 3 0 100-6 3 3 0 000 6z"/><path d="M10 18s-6-4.35-6-9a6 6 0 1112 0c0 4.65-6 9-6 9z"/>
                </svg>
                성북구 길음동
              </div>
            </div>
          </div>
          <div class="hosting-menu">김치전</div>
          <div class="hosting-meta">
            <span>
              <svg class="icon-sm" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="display:inline;vertical-align:-3px;margin-right:2px;width:14px;height:14px;">
                <rect x="3" y="4" width="14" height="14" rx="2"/><path d="M3 8h14"/><path d="M7 2v4M13 2v4"/>
              </svg>
              4월 16일 (수) · 저녁
            </span>
            <span class="badge badge-open">모집중 1/2</span>
          </div>
        </div>
      </a>

      <a href="/pages/hosting-detail.html?id=3" class="card hosting-card slide-up stagger-3">
        <div class="card-body">
          <div class="hosting-header">
            <div class="hosting-avatar">이</div>
            <div>
              <div class="hosting-name">이정자 어르신</div>
              <div class="hosting-district">
                <svg class="icon-sm" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="display:inline;vertical-align:-3px;margin-right:2px;width:14px;height:14px;">
                  <path d="M10 11a3 3 0 100-6 3 3 0 000 6z"/><path d="M10 18s-6-4.35-6-9a6 6 0 1112 0c0 4.65-6 9-6 9z"/>
                </svg>
                성북구 돈암동
              </div>
            </div>
          </div>
          <div class="hosting-menu">잔치국수</div>
          <div class="hosting-meta">
            <span>
              <svg class="icon-sm" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="display:inline;vertical-align:-3px;margin-right:2px;width:14px;height:14px;">
                <rect x="3" y="4" width="14" height="14" rx="2"/><path d="M3 8h14"/><path d="M7 2v4M13 2v4"/>
              </svg>
              4월 17일 (목) · 점심
            </span>
            <span class="badge badge-matched">매칭완료</span>
          </div>
        </div>
      </a>
    </div>

    <!-- Empty State -->
    <div id="empty-state" class="empty-state hidden">
      <svg class="empty-state-icon" viewBox="0 0 80 80" fill="none">
        <circle cx="40" cy="40" r="36" fill="currentColor" opacity="0.06"/>
        <path d="M24 44c0-8.8 7.2-16 16-16s16 7.2 16 16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M20 44h40v2c0 6.6-5.4 12-12 12H32c-6.6 0-12-5.4-12-12v-2z" fill="currentColor" opacity="0.08"/>
        <path d="M35 36c-.8-3 1-6 5-6s5.5 3 5 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
      </svg>
      <p>아직 등록된 호스팅이 없어요</p>
      <p class="text-sm mt-sm">어르신이 첫 밥동무를 기다리고 있어요!</p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-bottom">
        &copy; 2026 밥동무. 독거 어르신을 위한 식사 동반 플랫폼
      </div>
    </div>
  </footer>

  <script src="/js/api.js"></script>
  <script>
    function toggleNav() {
      const toggle = document.querySelector('.nav-toggle');
      const drawer = document.getElementById('navDrawer');
      toggle.classList.toggle('active');
      drawer.classList.toggle('open');
      document.body.style.overflow = drawer.classList.contains('open') ? 'hidden' : '';
    }

    function closeNav(e) {
      if (e.target === e.currentTarget) {
        toggleNav();
      }
    }
  </script>
</body>
</html>
